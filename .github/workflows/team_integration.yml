name: Team Integration Testing

on:
  push:
    branches: [ main, 'team-*/**' ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run integration tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  # Test each team's components individually
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        team-component:
          - backends/gateway     # Team Gateway
          - backends/bedrock     # Team AWS
          - backends/direct      # Team Performance
          - backends/mock        # Team QA
          - features/retry       # Team Reliability
          - features/cache       # Team Performance
          - features/validation  # Team QA
          - features/metrics     # Team Performance
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Test ${{ matrix.team-component }}
      run: |
        pytest tests/unit/test_${{ matrix.team-component }}.py -v
        
  # Test cross-team integration
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        
    - name: Test Backend Integration
      run: |
        pytest tests/integration/test_backend_switching.py -v
        
    - name: Test Feature Integration  
      run: |
        pytest tests/integration/test_feature_composition.py -v
        
    - name: Test Full System Integration
      run: |
        pytest tests/integration/test_unified_wrapper.py -v

  # Test performance benchmarks (Team Performance responsibility)
  performance-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        
    - name: Run Performance Benchmarks
      run: |
        pytest tests/performance/ -v --benchmark-only
        
    - name: Check Performance Regression
      run: |
        python scripts/check_performance_regression.py

  # Test DSPy compatibility (Team QA responsibility)  
  compatibility-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install dspy-ai  # Install DSPy for compatibility testing
        
    - name: Test DSPy Compatibility
      run: |
        pytest tests/compatibility/ -v

  # Test example code (All teams ensure their examples work)
  example-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        
    - name: Test Basic Examples
      run: |
        python examples/basic/simple_usage.py
        python examples/basic/backend_selection.py
        
    - name: Test Advanced Examples
      run: |
        python examples/advanced/custom_configuration.py
        python examples/advanced/feature_composition.py
        
    - name: Test Migration Examples
      run: |
        python examples/migration/from_old_patterns.py

  # Notify teams of results
  notify-teams:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, performance-tests, compatibility-tests, example-tests]
    if: always()
    
    steps:
    - name: Notify Teams of Success
      if: needs.unit-tests.result == 'success' && needs.integration-tests.result == 'success'
      run: |
        echo "✅ All team integration tests passed!"
        echo "Teams can continue collaborative development."
        
    - name: Notify Teams of Failure
      if: needs.unit-tests.result == 'failure' || needs.integration-tests.result == 'failure'
      run: |
        echo "❌ Integration tests failed!"
        echo "Teams should coordinate to fix issues before merging."
        exit 1

  # Create integration report for teams
  create-integration-report:
    runs-on: ubuntu-latest  
    needs: [unit-tests, integration-tests, performance-tests, compatibility-tests, example-tests]
    if: always()
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Generate Integration Report
      run: |
        mkdir -p reports
        echo "# Team Integration Report" > reports/integration_report.md
        echo "**Date**: $(date)" >> reports/integration_report.md
        echo "**Branch**: ${{ github.ref }}" >> reports/integration_report.md
        echo "**Commit**: ${{ github.sha }}" >> reports/integration_report.md
        echo "" >> reports/integration_report.md
        echo "## Test Results" >> reports/integration_report.md
        echo "- Unit Tests: ${{ needs.unit-tests.result }}" >> reports/integration_report.md
        echo "- Integration Tests: ${{ needs.integration-tests.result }}" >> reports/integration_report.md  
        echo "- Performance Tests: ${{ needs.performance-tests.result }}" >> reports/integration_report.md
        echo "- Compatibility Tests: ${{ needs.compatibility-tests.result }}" >> reports/integration_report.md
        echo "- Example Tests: ${{ needs.example-tests.result }}" >> reports/integration_report.md
        echo "" >> reports/integration_report.md
        echo "## Team Status" >> reports/integration_report.md
        echo "All teams can see the results of their collaborative work." >> reports/integration_report.md
        
    - name: Upload Integration Report
      uses: actions/upload-artifact@v3
      with:
        name: integration-report
        path: reports/integration_report.md