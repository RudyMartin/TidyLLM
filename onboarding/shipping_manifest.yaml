# TidyLLM Corporate Onboarding Package - Shipping Manifest
# =======================================================
# This manifest defines all files needed for complete corporate deployment
# and onboarding validation of TidyLLM systems.
#
# Generated: 2025-09-09
# Version: Enhanced v2.0
# Target: Corporate environments with SSO, proxy, and compliance requirements

package_info:
  name: "tidyllm-corporate-onboarding"
  version: "2.0.0"
  description: "Complete corporate onboarding solution for TidyLLM with universal validation"
  target_environments:
    - "Corporate networks with proxy"
    - "SSO/SAML authentication required"
    - "PostgreSQL + MLflow integration"
    - "Kubernetes and Docker deployments"
  
# =============================================================================
# ONBOARDING PACKAGE FILES
# =============================================================================
onboarding_package:
  core_files:
    - name: "template.settings.yaml"
      description: "Safe configuration template without credentials"
      required: true
      sensitive: false
      
    - name: "config_generator.py"
      description: "Configuration generator for corporate deployments"
      required: true
      sensitive: false
      
    - name: "session_validator.py" 
      description: "Original session validation (legacy compatibility)"
      required: false
      sensitive: false
      
    - name: "enhanced_session_validator.py"
      description: "Enhanced corporate session validator with SSO support"
      required: true
      sensitive: false
      
    - name: "universal_preflight.py"
      description: "Universal pre-flight test framework"
      required: true
      sensitive: false
      
    - name: "cli_onboarding.py"
      description: "Original CLI onboarding wizard (legacy)"
      required: false
      sensitive: false
      
    - name: "enhanced_cli_onboarding.py"
      description: "Enhanced CLI wizard with comprehensive validation"
      required: true
      sensitive: false
      
    - name: "streamlit_app.py"
      description: "Web-based GUI for onboarding configuration"
      required: true
      sensitive: false
      
    - name: "README.md"
      description: "Complete documentation and setup guide"
      required: true
      sensitive: false

# =============================================================================
# TEST SUITE FILES (For validation and demonstration)
# =============================================================================
test_suite:
  preflight_tests:
    - name: "tests/00_preflight/test_aws_connectivity.py"
      description: "Original proven AWS connectivity test"
      required: true
      purpose: "Demonstrate base AWS validation works"
      expected_result: "PASS with valid credentials"
      
  core_tests:
    - name: "tests/01_core/test_01_package_structure.py"
      description: "Package structure validation"
      required: true
      purpose: "Show onboarding package is complete"
      expected_result: "PASS for onboarding, FAIL for missing tidyllm"
      
    - name: "tests/01_core/test_02_imports.py" 
      description: "Import validation tests"
      required: true
      purpose: "Verify onboarding modules import correctly"
      expected_result: "PARTIAL - onboarding imports work, tidyllm fails"
      
  infrastructure_tests:
    - name: "tests/02_infrastructure/test_03_config.py"
      description: "Configuration management tests"
      required: true
      purpose: "Validate config generation works"
      expected_result: "PARTIAL - config generation works, full system fails"
      
  integration_tests:
    - name: "tests/run_critical_tests.py"
      description: "Critical path test runner"
      required: true
      purpose: "Demonstrate systematic testing approach"
      expected_result: "Onboarding validation PASS, system tests FAIL"
      
    - name: "tests/run_all_tests.py"
      description: "Complete test suite runner"  
      required: true
      purpose: "Full system validation (will mostly fail without tidyllm)"
      expected_result: "Extensive failures expected without full tidyllm"
      
  security_tests:
    - name: "tests/8_test_security.py"
      description: "Security and compliance tests"
      required: true
      purpose: "Validate corporate security features"
      expected_result: "Basic security tests PASS"

# =============================================================================
# DEPENDENCIES AND REQUIREMENTS
# =============================================================================
dependencies:
  python_version: ">=3.8"
  
  required_packages:
    - "boto3>=1.26.0"
    - "botocore>=1.29.0"  
    - "pyyaml>=6.0"
    - "requests>=2.28.0"
    - "psycopg2-binary>=2.9.0"  # For PostgreSQL
    - "pandas>=1.5.0"  # For data handling
    
  optional_packages:
    - "rich>=13.0.0"  # For CLI colors and formatting
    - "streamlit>=1.28.0"  # For web interface
    - "mlflow>=2.0.0"  # For MLflow validation
    - "pytest>=7.0.0"  # For running tests
    
  system_requirements:
    - "Network access to AWS endpoints"
    - "Optional: PostgreSQL database"
    - "Optional: MLflow tracking server"
    - "Optional: Corporate proxy configuration"

# =============================================================================
# VALIDATION CHECKLIST
# =============================================================================
validation_checklist:
  pre_shipping:
    - "All core onboarding files present"
    - "Enhanced session validator imports successfully" 
    - "Universal preflight framework works standalone"
    - "Configuration generation produces valid YAML"
    - "Test suite runs and shows expected pass/fail pattern"
    - "README.md contains complete setup instructions"
    - "No hardcoded credentials in any files"
    - "All files are safe for corporate distribution"
    
  post_deployment:
    - "AWS connectivity validation passes"
    - "Corporate environment detection works"
    - "SSO/proxy configuration functions properly"
    - "PostgreSQL validation works if database available"
    - "MLflow validation works if server available"
    - "Configuration generation produces deployable config"
    - "Docker/Kubernetes artifacts generate correctly"

# =============================================================================
# EXPECTED TEST RESULTS PATTERN
# =============================================================================
expected_test_pattern:
  description: "Tests should show onboarding works but full system fails"
  
  should_pass:
    - "Enhanced session validator imports and runs"
    - "Universal preflight detects environment correctly"
    - "AWS connectivity validation (with valid credentials)"
    - "Configuration generation from templates"
    - "Basic security and compliance checks"
    - "Onboarding package structure validation"
    
  should_fail:
    - "Full TidyLLM system imports (tidyllm.* modules)"
    - "Gateway system initialization"
    - "Knowledge server operations"
    - "Worker architecture tests"
    - "End-to-end integration tests"
    
  partial_results:
    - "Infrastructure tests: Basic config works, advanced features fail"
    - "Core tests: Package structure good, system imports fail"
    - "Integration tests: Connectivity good, full stack fails"

# =============================================================================
# DEPLOYMENT SCENARIOS
# =============================================================================
deployment_scenarios:
  scenario_1:
    name: "Corporate Network with Proxy"
    description: "Behind corporate firewall with proxy and custom CA"
    validation_steps:
      - "Proxy detection works"
      - "Custom CA certificate handling" 
      - "AWS connectivity through proxy"
      - "SSL/TLS validation with corporate certs"
      
  scenario_2:
    name: "SSO with Temporary Credentials"  
    description: "AWS SSO or SAML with temporary credential refresh"
    validation_steps:
      - "SSO credential detection"
      - "Temporary credential handling"
      - "Credential expiration management"
      - "Auto-refresh capability"
      
  scenario_3:
    name: "Complete Database Stack"
    description: "PostgreSQL + MLflow + AWS services"
    validation_steps:
      - "Database connectivity validation"
      - "MLflow server integration"
      - "Cross-service compatibility"
      - "End-to-end data flow"

# =============================================================================
# QUALITY GATES
# =============================================================================
quality_gates:
  code_quality:
    - "All Python files pass syntax check"
    - "No hardcoded secrets or credentials"
    - "Proper error handling and logging"
    - "Clear documentation and comments"
    
  security_compliance:
    - "No sensitive data in configuration templates"
    - "Credential handling uses environment variables"
    - "SSL/TLS validation enabled by default"
    - "Audit logging configured for corporate compliance"
    
  usability:
    - "README provides clear setup instructions"
    - "CLI wizard guides users through configuration"
    - "Web interface works without complex setup"
    - "Error messages are helpful and actionable"
    
  reliability:
    - "Graceful handling of missing dependencies"
    - "Network timeouts and retries configured"
    - "Fallback options for different environments"
    - "Comprehensive validation and error reporting"

# =============================================================================
# SHIPPING VERIFICATION COMMAND
# =============================================================================
shipping_verification:
  command: "python verify_shipping_package.py"
  description: "Automated verification that package is ready for shipping"
  checks:
    - "File presence according to manifest"
    - "Import validation for all modules"
    - "Basic functionality testing"
    - "Security scan for hardcoded secrets"
    - "Documentation completeness check"