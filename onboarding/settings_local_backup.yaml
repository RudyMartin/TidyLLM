# TidyLLM Live Configuration
# ===========================
# Real configuration with AWS credentials for testing

# Environment settings
environment: "development"
organization: "TidyLLM Testing"
deployment_type: "development"

# AWS Configuration for real connectivity
aws:
  region: "us-east-1"
  access_key_id: "REMOVED_AWS_KEY"
  secret_access_key: "REMOVED_AWS_SECRET"
  default_region: "us-east-1"
  
  bedrock:
    region: "us-east-1"
    default_model: "anthropic.claude-3-sonnet-20240229-v1:0"
    
    model_mapping:
      "claude-3-sonnet": "anthropic.claude-3-sonnet-20240229-v1:0"
      "claude-3-haiku": "anthropic.claude-3-haiku-20240307-v1:0"

# API Keys for real AI model access
api_keys:
  # AWS credentials for Bedrock
  aws_access_key_id: "REMOVED_AWS_KEY"
  aws_secret_access_key: "REMOVED_AWS_SECRET"

# Database configuration (real PostgreSQL)
postgres:
  host: "vectorqa-cluster.cluster-cu562e4m02nq.us-east-1.rds.amazonaws.com"
  port: 5432
  db_name: "vectorqa" 
  db_user: "vectorqa_user"
  ssl_mode: "require"
  connection_pool_size: 10
  max_retries: 3
  retry_delay: 2.0

# S3 configuration (real bucket)
s3:
  region: "us-east-1"
  bucket: "nsc-mvp1"
  prefix: "onboarding-test/"
  connection_timeout: 30
  max_retries: 3

# Security settings (minimal for testing)
security:
  data:
    encrypt_cache: false
    encrypt_logs: false
    mask_sensitive_data: true
    cache_retention_days: 1
    log_retention_days: 7
  
  access:
    require_auth: false  # Disabled for testing
    rate_limit:
      enabled: true
      requests_per_minute: 100
      requests_per_hour: 1000
  
  audit:
    enabled: true
    audit_all_requests: false  # Minimal for testing
    audit_retention_days: 7

# Logging configuration
logging:
  level: "INFO"
  format: "simple"
  include_user_id: false
  include_session_id: true
  include_request_id: true
  
  handlers:
    file:
      enabled: true
      path: "./logs/tidyllm.log"
      max_size_mb: 50
      backup_count: 3

# Network configuration (no proxy for testing)
network:
  proxy:
    enabled: false
  
  timeouts:
    connect_timeout: 15
    read_timeout: 60
    total_timeout: 120
  
  ssl:
    verify: true

# Monitoring (basic for testing)
monitoring:
  enabled: true
  
  health_check:
    enabled: true
    interval_seconds: 120
    endpoint: "/health"
  
  metrics:
    enabled: true
    export_to_prometheus: false
  
  alerts:
    enabled: false  # Disabled for testing

# Integration settings (minimal for testing)
integrations:
  sso:
    enabled: false  # Disabled for testing
  
  ldap:
    enabled: false
  
  observability:
    datadog:
      enabled: false
    newrelic:
      enabled: false