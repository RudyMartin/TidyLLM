# TidyLLM Demos - Shared Configuration

# Database settings
database:
  host: localhost
  port: 5432
  name: tidyllm_demos
  user: postgres
  password: ""

# MLflow settings
mlflow:
  tracking_uri: http://localhost:5000
  gateway_uri: http://localhost:5000
  experiment_name: "tidyllm_demos"

# TidyLLM Gateway settings
tidyllm_gateway:
  mlflow_gateway_uri: http://localhost:5000
  default_provider: claude
  default_model: claude-3-5-sonnet
  max_cost_per_request_usd: 1.0
  budget_limit_daily_usd: 100.0

# Demo-specific settings
demos:
  live_ticker:
    update_interval: 5  # seconds
    max_responses: 50
    budget_settings:
      hourly_budget: 100.0
      daily_budget: 2400.0
      monthly_budget: 72000.0
      cost_multiplier: 1.0
      model_cost_weights:
        gpt-4: 1.0
        gpt-3.5-turbo: 0.1
        claude-3: 0.5
        claude-3-5-sonnet: 0.3
  
  gateway_control:
    refresh_interval: 10  # seconds
    max_log_entries: 100
  
  settings_config:
    auto_save: true
    backup_count: 5


