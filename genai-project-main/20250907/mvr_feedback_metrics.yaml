mvr_feedback_metrics:
  # =========================
  # Scope / Standards / Docs
  # =========================
  - metric_id: required_sections_full_scope
    metric_name: "sections required for full scope validation per Model and Review Attributes and Model Validation Standard"
    qa_category: scope_coverage
    mv_dimension: scope_and_standards_alignment
    mv_related: vst_mvr_standards
    metric_description: "Count of sections that are required by standards and model/review attributes for a full-scope validation."
    metric_question: "Did we include every section required for a full-scope validation?"
    metric_type: count
    metric_num: "num_required_sections_per_standards"
    metric_denom: ""

  - metric_id: sections_in_scope_vst
    metric_name: "sections marked as in-scope in the approved VST"
    qa_category: scope_coverage
    mv_dimension: scope_definition
    mv_related: vst
    metric_description: "Number of sections designated in-scope in the approved Validation Scope Template (VST)."
    metric_question: "What did the VST define as in-scope?"
    metric_type: count
    metric_num: "num_sections_in_scope_vst"
    metric_denom: ""

  - metric_id: sections_in_scope_mvr
    metric_name: "sections treated as in-scope in the final MVR"
    qa_category: scope_coverage
    mv_dimension: execution_vs_plan
    mv_related: mvr
    metric_description: "Number of sections actually treated as in-scope in the Model Validation Report (MVR)."
    metric_question: "What did the MVR actually execute as in-scope?"
    metric_type: count
    metric_num: "num_sections_in_scope_mvr"
    metric_denom: ""

  - metric_id: sections_out_of_scope_vst
    metric_name: "sections marked as out-of-scope in the approved VST"
    qa_category: scope_coverage
    mv_dimension: scope_definition
    mv_related: vst
    metric_description: "Number of sections explicitly out-of-scope per the approved VST."
    metric_question: "What did the VST exclude?"
    metric_type: count
    metric_num: "num_sections_oot_vst"
    metric_denom: ""

  - metric_id: sections_out_of_scope_mvr
    metric_name: "sections treated as out-of-scope in the approved VST"
    qa_category: scope_coverage
    mv_dimension: execution_vs_plan
    mv_related: mvr_vs_vst
    metric_description: "Number of sections the MVR treated as out-of-scope (compare to VST)."
    metric_question: "What did the MVR exclude in execution?"
    metric_type: count
    metric_num: "num_sections_oot_mvr"
    metric_denom: ""

  - metric_id: independent_tests_required
    metric_name: "independent tests required for full scope validation per Model and Review Attributes and Model Validation Plan"
    qa_category: independence_and_testing
    mv_dimension: testing_requirements
    mv_related: validation_plan_review_attributes
    metric_description: "Total number of independent tests required by the plan and attributes."
    metric_question: "How many independent tests were required?"
    metric_type: count
    metric_num: "num_independent_tests_required"
    metric_denom: ""

  - metric_id: independent_tests_performed
    metric_name: "independent tests performed within the final validation report"
    qa_category: independence_and_testing
    mv_dimension: execution_quality
    mv_related: mvr
    metric_description: "Number of independent tests actually performed and documented in the MVR."
    metric_question: "How many independent tests were performed?"
    metric_type: count
    metric_num: "num_independent_tests_performed"
    metric_denom: ""

  - metric_id: sections_req_independent_tests
    metric_name: "sections of the MVR report which require independent test per the Model and Review Attributes"
    qa_category: independence_and_testing
    mv_dimension: traceability
    mv_related: mvr_review_attributes
    metric_description: "Count of MVR sections that require independent testing based on review attributes."
    metric_question: "Which sections necessitate independent testing?"
    metric_type: count
    metric_num: "num_sections_requiring_independent_tests"
    metric_denom: ""

  - metric_id: all_sections_mvr_template
    metric_name: "sections included in the base template"
    qa_category: documentation_completeness
    mv_dimension: template_baseline
    mv_related: mvr_template
    metric_description: "Total sections present in the standard MVR template."
    metric_question: "What is the baseline number of sections in the MVR template?"
    metric_type: count
    metric_num: "num_template_sections"
    metric_denom: ""

  - metric_id: all_sections_mvr_report
    metric_name: "sections included in the final MVR"
    qa_category: documentation_completeness
    mv_dimension: execution_completeness
    mv_related: mvr
    metric_description: "Total sections actually present in the final MVR."
    metric_question: "How many sections did the final MVR include?"
    metric_type: count
    metric_num: "num_mvr_sections"
    metric_denom: ""

  - metric_id: documents_referenced_body
    metric_name: "documents referenced in the review body"
    qa_category: evidence_and_references
    mv_dimension: evidentiary_support
    mv_related: mvr_body
    metric_description: "Count of external/internal documents cited in the narrative body of the MVR."
    metric_question: "How many documents are cited in the MVR body?"
    metric_type: count
    metric_num: "num_documents_referenced_body"
    metric_denom: ""

  - metric_id: documents_referenced_bib
    metric_name: "documents included in review bibliography"
    qa_category: evidence_and_references
    mv_dimension: evidentiary_support
    mv_related: mvr_bibliography
    metric_description: "Count of documents listed in the bibliography section."
    metric_question: "How many documents are listed in the bibliography?"
    metric_type: count
    metric_num: "num_documents_referenced_bib"
    metric_denom: ""

  - metric_id: documents_accessible
    metric_name: "documents which were accessible per the recorded location in the MVR (if not referenced, count as inaccessible)"
    qa_category: evidence_and_references
    mv_dimension: accessibility_and_reproducibility
    mv_related: repositories_links
    metric_description: "Number of referenced documents that were actually reachable at recorded locations."
    metric_question: "Of the referenced documents, how many were accessible at the stated location?"
    metric_type: ratio
    metric_num: "num_documents_accessible"
    metric_denom: "num_documents_referenced_total"

  - metric_id: new_findings
    metric_name: "findings cited during the review"
    qa_category: findings_and_issues
    mv_dimension: deficiency_tracking
    mv_related: mvr_findings_register
    metric_description: "Count of new findings raised by validation activities."
    metric_question: "How many new findings were cited in the review?"
    metric_type: count
    metric_num: "num_new_findings"
    metric_denom: ""

  # =========================
  # Peer Review Process (new)
  # =========================
  - metric_id: recursive_evaluation
    metric_name: "evaluate each section and all nested subsections"
    qa_category: peer_review_process
    mv_dimension: evaluation_depth
    mv_related: mvr_sections
    metric_description: "Ensure each section, including parent and nested subsections, is evaluated and logged separately."
    metric_question: "Were all sections and subsections explicitly reviewed and logged?"
    metric_type: boolean
    metric_num: "num_sections_reviewed"
    metric_denom: "num_sections_total"

  - metric_id: extract_section_text
    metric_name: "extract section text"
    qa_category: peer_review_process
    mv_dimension: evidence_capture
    mv_related: mvr_sections
    metric_description: "Extract the full text of each section for review."
    metric_question: "Was section text extracted for review?"
    metric_type: boolean
    metric_num: "num_sections_extracted"
    metric_denom: "num_sections_total"

  - metric_id: map_conclusions_to_evidence
    metric_name: "map each conclusion, finding, or assertion to cited evidence"
    qa_category: peer_review_process
    mv_dimension: traceability
    mv_related: mvr_findings
    metric_description: "Every MRM conclusion, finding, or assertion must be mapped to explicit evidence."
    metric_question: "Are all conclusions/findings explicitly mapped to evidence?"
    metric_type: ratio
    metric_num: "num_conclusions_mapped"
    metric_denom: "num_conclusions_total"

  - metric_id: trace_logic
    metric_name: "trace the logic step-by-step"
    qa_category: peer_review_process
    mv_dimension: reasoning_quality
    mv_related: mvr_assertions
    metric_description: "Trace reasoning for each assertion to ensure no unsupported leaps."
    metric_question: "Is reasoning valid without unsupported leaps?"
    metric_type: ratio
    metric_num: "num_assertions_with_valid_logic"
    metric_denom: "num_assertions_total"

  - metric_id: effective_challenge
    metric_name: "peer reviewer effective challenge"
    qa_category: peer_review_process
    mv_dimension: challenge_strength
    mv_related: peer_review
    metric_description: "Assess whether a reviewer could follow/agree with logic and reasonably challenge conclusions."
    metric_question: "Could a peer reviewer reasonably follow and challenge the logic?"
    metric_type: qualitative
    metric_num: ""
    metric_denom: ""

  - metric_id: internal_contradiction_search
    metric_name: "search for internal inconsistencies or omissions"
    qa_category: peer_review_process
    mv_dimension: contradiction_detection
    mv_related: mvr_internal
    metric_description: "Search the MVR for omissions, contradictions, self-contradictions, or unsupported reasoning."
    metric_question: "Were internal contradictions or omissions identified?"
    metric_type: count
    metric_num: "num_internal_contradictions"
    metric_denom: ""

  - metric_id: external_contradiction_search
    metric_name: "search for external regulatory or industry contradictions"
    qa_category: peer_review_process
    mv_dimension: contradiction_detection
    mv_related: external_sources
    metric_description: "Search regulatory updates, enforcement actions, or industry criticism that contradicts the MVR."
    metric_question: "Were external contradictions identified?"
    metric_type: count
    metric_num: "num_external_contradictions"
    metric_denom: ""

  - metric_id: peer_reviewers_challenge
    metric_name: "explicit statement of strongest peer reviewer challenge"
    qa_category: peer_review_process
    mv_dimension: reviewer_challenge
    mv_related: peer_review
    metric_description: "Explicitly state the strongest peer reviewer challenge to the sufficiency of MRM's analysis."
    metric_question: "What is the strongest challenge to the sufficiency of the MRM analysis?"
    metric_type: qualitative
    metric_num: ""
    metric_denom: ""

  - metric_id: assign_confidence_score
    metric_name: "assign calibrated confidence score"
    qa_category: scoring
    mv_dimension: confidence_calibration
    mv_related: peer_review
    metric_description: "Assign confidence: Certain, Highly Confident, Moderately Confident, Speculative, or Unknown."
    metric_question: "What is the calibrated confidence score for this conclusion?"
    metric_type: categorical
    metric_num: ""
    metric_denom: ""

  - metric_id: assign_compliance_status
    metric_name: "assign compliance status"
    qa_category: scoring
    mv_dimension: compliance_status
    mv_related: peer_review
    metric_description: "Assign compliance status: Compliant, Partially Compliant, Non-Compliant, or Inconclusive."
    metric_question: "What is the compliance status for this section?"
    metric_type: categorical
    metric_num: ""
    metric_denom: ""

# ===========================================
# Output Row Schema (table you generate/CSV)
# ===========================================
output_row_schema:
  - field_id: section_id
    field_name: "section id"
    description: "Unique identifier for the MVR section (parent or nested)."
    type: string
    required: true

  - field_id: requirement_ids
    field_name: "requirement ids"
    description: "One or more identifiers for relevant MVS requirements and VST sections."
    type: array_string
    required: true

  - field_id: narrative_summary
    field_name: "narrative summary"
    description: "Short summary: Did MRM's logic, evidence, and rationale meet requirements?"
    type: string
    required: true

  - field_id: contradiction_challenge_summary
    field_name: "contradiction/challenge summary"
    description: "Summary of any internal/external contradiction, challenge, or explicit statement that none was found."
    type: string
    required: true

  - field_id: peer_reviewer_challenge
    field_name: "peer reviewer challenge"
    description: "Strongest peer reviewer challenge to logic or sufficiency."
    type: string
    required: false

  - field_id: conclusion
    field_name: "conclusion"
    description: "Reviewer’s conclusion for the section."
    type: string
    required: true
    allowed_values:
      - meets_requirements
      - acceptable_with_conditions
      - does_not_meet_requirements
      - unclear

  - field_id: confidence_score
    field_name: "confidence score"
    description: "Calibrated confidence rating based on corroborated evidence."
    type: categorical
    required: true
    allowed_values:
      - certain
      - highly_confident
      - moderately_confident
      - speculative
      - unknown

  - field_id: compliance_status
    field_name: "compliance status"
    description: "Section-level compliance status."
    type: categorical
    required: true
    allowed_values:
      - compliant
      - partially_compliant
      - non_compliant
      - inconclusive

  - field_id: defect_type
    field_name: "defect type"
    description: "If applicable, classify defect (e.g., logic_gap, missing_evidence, contradiction, documentation_issue)."
    type: categorical
    required: false
    allowed_values:
      - ""
      - logic_gap
      - missing_evidence
      - contradiction
      - documentation_issue

  - field_id: citations
    field_name: "citations"
    description: "Evidence citations/links referenced in body or bibliography."
    type: array_string
    required: false

  - field_id: quotes_used
    field_name: "quotes used"
    description: "Number of direct quotes used for this section (limit per guidance)."
    type: integer
    required: false

  - field_id: notes
    field_name: "notes"
    description: "Any additional reviewer notes or context."
    type: string
    required: false
