      application: "Efficient model comparison"
      sparse_encoding: "@model#comparison!compressed_sensing@efficient_comparison"
      
    - algorithm: "OMP"
      application: "Fast feature extraction"
      sparse_encoding: "@model#features!omp@fast_extraction"
      
    - algorithm: "Online Dictionary Learning"
      application: "Adaptive validation frameworks"
      sparse_encoding: "@validation#framework!online_dictionary@adaptive_learning"

sparse_language_integration:
  # How our sparse language can encode algorithm concepts
  algorithm_encodings:
    - algorithm: "Basis Pursuit"
      sparse_encoding: "@optimization#l1_minimization!basis_pursuit@exact_recovery"
      expanded: "L1-norm minimization using basis pursuit for exact sparse recovery"
      
    - algorithm: "OMP"
      sparse_encoding: "@greedy#matching_pursuit!orthogonal@sparse_approximation"
      expanded: "Orthogonal matching pursuit greedy algorithm for sparse approximation"
      
    - algorithm: "K-SVD"
      sparse_encoding: "@dictionary_learning#k_svd!adaptive@sparse_coding"
      expanded: "K-SVD algorithm for adaptive dictionary learning in sparse coding"
      
    - algorithm: "CoSaMP"
      sparse_encoding: "@compressed_sensing#cosamp!theoretical@robust_recovery"
      expanded: "CoSaMP algorithm for theoretical robust recovery in compressed sensing"
      
    - algorithm: "LISTA"
      sparse_encoding: "@deep_learning#lista!learned@unfolded_algorithm"
      expanded: "LISTA deep learning algorithm for learned unfolded iterative soft-thresholding"

performance_benchmarks:
  # Expected performance characteristics
  computational_complexity:
    - "L1 minimization: O(n³)"
    - "OMP: O(k²n)"
    - "MP: O(kn)"
    - "K-SVD: O(kn²)"
    - "CoSaMP: O(k²n)"
    - "LISTA: O(Ln²)"
  
  memory_requirements:
    - "L1 minimization: O(n²)"
    - "OMP: O(nk)"
    - "MP: O(n)"
    - "K-SVD: O(nk)"
    - "CoSaMP: O(nk)"
    - "LISTA: O(n²)"
  
  accuracy_metrics:
    - "Reconstruction error: ||x - x̂||₂"
    - "Support recovery: |supp(x) ∩ supp(x̂)|/|supp(x)|"
    - "Sparsity level: ||x̂||₀"
    - "Convergence rate: iterations to convergence"

