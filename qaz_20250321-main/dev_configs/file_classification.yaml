# File Classification Configuration for MVR Review
# Defines file types, their categories, and processing requirements

file_types:
  # Unclassified
  unclassified:
    extensions: ['.pdf', '.docx', '.doc', '.md', '.txt', '.yaml', '.yml', '.json', '.csv', '.xlsx', '.py', '.r', '.sql', '.ipynb', '.html', '.xml', '.log']
    category: "Unclassified (U)"
    description: "Documents that need classification based on content analysis"
    priority: "Low"
    required_fields:
      - "content_analysis"
      - "classification_attempt"
    compliance_checks:
      - "content_validation"
      - "classification_accuracy"
    
  # Whitepaper
  whitepaper:
    extensions: ['.pdf', '.docx', '.doc', '.md', '.txt']
    category: "Whitepaper (W)"
    description: "Academic papers, research documents, and technical whitepapers"
    priority: "Medium"
    required_fields:
      - "title"
      - "authors"
      - "abstract"
      - "references"
    compliance_checks:
      - "academic_standards"
      - "citation_accuracy"
      - "methodology_validation"
    
  # Validation Scoping Template
  validation_scoping_template:
    extensions: ['.pdf', '.docx', '.doc', '.md', '.txt', '.yaml', '.yml', '.json']
    category: "Validation Scoping Template (VST)"
    description: "Templates and frameworks for model validation scoping"
    priority: "High"
    required_fields:
      - "validation_scope"
      - "stakeholders"
      - "timeline"
      - "resources"
    compliance_checks:
      - "scope_completeness"
      - "stakeholder_approval"
      - "resource_allocation"
    
  # Annual Model Review
  annual_model_review:
    extensions: ['.pdf', '.docx', '.doc', '.md', '.txt', '.xlsx', '.xls']
    category: "Annual Model Review (AMR)"
    description: "Annual comprehensive model review documents and assessments"
    priority: "High"
    required_fields:
      - "review_period"
      - "model_performance"
      - "risk_assessment"
      - "recommendations"
    compliance_checks:
      - "review_completeness"
      - "performance_analysis"
      - "risk_evaluation"
    
  # Model Documentation Assessment
  model_documentation_assessment:
    extensions: ['.pdf', '.docx', '.doc', '.md', '.txt', '.yaml', '.yml', '.json']
    category: "Model Documentation Assessment (MDA)"
    description: "Assessments of model documentation quality and completeness"
    priority: "High"
    required_fields:
      - "documentation_score"
      - "missing_elements"
      - "improvement_areas"
      - "compliance_status"
    compliance_checks:
      - "documentation_quality"
      - "completeness_assessment"
      - "compliance_validation"
    
  # Model Development Document
  model_development_document:
    extensions: ['.pdf', '.docx', '.doc', '.md', '.txt', '.yaml', '.yml', '.json', '.py', '.r', '.sql', '.ipynb']
    category: "Model Development Document (MDD)"
    description: "Model development specifications, architecture, and implementation details"
    priority: "High"
    required_fields:
      - "model_architecture"
      - "development_methodology"
      - "data_sources"
      - "implementation_details"
    compliance_checks:
      - "development_standards"
      - "methodology_validation"
      - "implementation_quality"
    
  # Model Development Plan
  model_development_plan:
    extensions: ['.pdf', '.docx', '.doc', '.md', '.txt', '.yaml', '.yml', '.json', '.xlsx', '.xls']
    category: "Model Development Plan (MDP)"
    description: "Strategic plans and roadmaps for model development lifecycle"
    priority: "High"
    required_fields:
      - "development_timeline"
      - "resource_planning"
      - "methodology_framework"
      - "success_criteria"
    compliance_checks:
      - "plan_completeness"
      - "resource_planning"
      - "methodology_validation"
    
  # SDC Validation Report
  sdc_validation_report:
    extensions: ['.pdf', '.docx', '.doc', '.md', '.txt', '.xlsx', '.xls']
    category: "SDC Validation Report (SVR)"
    description: "Software Development Cycle validation reports and assessments"
    priority: "High"
    required_fields:
      - "validation_phase"
      - "test_results"
      - "defects_found"
      - "validation_conclusion"
    compliance_checks:
      - "validation_completeness"
      - "test_coverage"
      - "defect_management"
    
  # QA Template
  qa_template:
    extensions: ['.pdf', '.docx', '.doc', '.md', '.txt', '.yaml', '.yml', '.json', '.xlsx', '.xls']
    category: "QA Template (QAT)"
    description: "Quality Assurance templates, checklists, and assessment frameworks"
    priority: "Medium"
    required_fields:
      - "qa_framework"
      - "checklist_items"
      - "assessment_criteria"
      - "quality_metrics"
    compliance_checks:
      - "template_completeness"
      - "criteria_validation"
      - "quality_assessment"
    
  # Implementation Testing Document
  implementation_testing_document:
    extensions: ['.pdf', '.docx', '.doc', '.md', '.txt', '.yaml', '.yml', '.json', '.xlsx', '.xls']
    category: "Implementation Testing Document (ITD)"
    description: "Testing documentation for model implementation and deployment"
    priority: "High"
    required_fields:
      - "test_plan"
      - "test_cases"
      - "test_results"
      - "deployment_validation"
    compliance_checks:
      - "test_coverage"
      - "test_execution"
      - "deployment_validation"
    
  # Model Implementation Plan
  model_implementation_plan:
    extensions: ['.pdf', '.docx', '.doc', '.md', '.txt', '.yaml', '.yml', '.json', '.xlsx', '.xls']
    category: "Model Implementation Plan (MIP)"
    description: "Plans and roadmaps for model implementation and deployment"
    priority: "High"
    required_fields:
      - "implementation_timeline"
      - "resource_requirements"
      - "deployment_strategy"
      - "risk_mitigation"
    compliance_checks:
      - "plan_completeness"
      - "resource_allocation"
      - "risk_assessment"
    
  # Standards/Procedures
  standards_procedures:
    extensions: ['.pdf', '.docx', '.doc', '.md', '.txt', '.yaml', '.yml', '.json', '.xlsx', '.xls']
    category: "Standards/Procedures (SP)"
    description: "Organizational standards, procedures, and governance frameworks"
    priority: "Medium"
    required_fields:
      - "standard_name"
      - "procedure_steps"
      - "compliance_requirements"
      - "governance_framework"
    compliance_checks:
      - "standard_compliance"
      - "procedure_validation"
      - "governance_adherence"
    
  # Model Performance Monitoring Plan
  model_performance_monitoring_plan:
    extensions: ['.pdf', '.docx', '.doc', '.md', '.txt', '.yaml', '.yml', '.json', '.xlsx', '.xls']
    category: "Model Performance Monitoring (MPM) Plan"
    description: "Plans and frameworks for monitoring model performance in production"
    priority: "High"
    required_fields:
      - "monitoring_framework"
      - "performance_metrics"
      - "alert_thresholds"
      - "escalation_procedures"
    compliance_checks:
      - "monitoring_coverage"
      - "alert_validation"
      - "performance_tracking"
    
  # Post-Development Recalibrated Model Plan
  post_development_recalibrated_model_plan:
    extensions: ['.pdf', '.docx', '.doc', '.md', '.txt', '.yaml', '.yml', '.json', '.xlsx', '.xls']
    category: "Post-Development Recalibrated Model (PDRM) Plan"
    description: "Plans for model recalibration and updates after initial development"
    priority: "High"
    required_fields:
      - "recalibration_triggers"
      - "update_procedures"
      - "validation_requirements"
      - "deployment_strategy"
    compliance_checks:
      - "recalibration_validation"
      - "update_procedures"
      - "deployment_approval"
    
  # Modeling Area Prioritization Plan
  modeling_area_prioritization_plan:
    extensions: ['.pdf', '.docx', '.doc', '.md', '.txt', '.yaml', '.yml', '.json', '.xlsx', '.xls']
    category: "Modeling Area Prioritization Plan (MAPP)"
    description: "Strategic plans for prioritizing modeling areas and resource allocation"
    priority: "High"
    required_fields:
      - "prioritization_criteria"
      - "resource_allocation"
      - "timeline_framework"
      - "success_metrics"
    compliance_checks:
      - "prioritization_validation"
      - "resource_planning"
      - "strategic_alignment"

# Classification Rules
classification_rules:
  # Priority-based classification
  priority_order:
    - "High"
    - "Medium" 
    - "Low"
  
  # Size-based rules
  size_limits:
    small: "10MB"
    medium: "100MB"
    large: "1GB"
    max_upload: "5GB"
  
  # Content-based classification
  content_indicators:
    model_keywords:
      - "model"
      - "algorithm"
      - "prediction"
      - "training"
      - "validation"
    risk_keywords:
      - "risk"
      - "compliance"
      - "audit"
      - "governance"
      - "regulatory"
    data_keywords:
      - "dataset"
      - "features"
      - "target"
      - "preprocessing"
      - "cleaning"

# Processing Configuration
processing:
  # Batch processing settings
  batch_size: 10
  max_concurrent: 5
  timeout_seconds: 300
  
  # Validation settings
  validate_content: true
  extract_metadata: true
  generate_summary: true
  
  # Output settings
  create_thumbnails: false
  generate_previews: true
  store_processed: true

# Compliance Mapping
compliance_mapping:
  unclassified:
