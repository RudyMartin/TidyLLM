# VectorQA Sage - Nginx Configuration
# Auth: Rudy Martin - Next Shift Consulting LLC
# Date: 2025-08-23

events {
    worker_connections 1024;
}

http {
    upstream vectorqa_backend {
        server vectorqa-sage:8501;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=vectorqa_limit:10m rate=10r/s;

    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name your-domain.com;  # Change this to your domain

        # SSL configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Rate limiting
        limit_req zone=vectorqa_limit burst=20 nodelay;

        # Proxy settings
        location / {
            proxy_pass http://vectorqa_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://vectorqa_backend/_stcore/health;
            access_log off;
        }

        # Static files (if needed)
        location /static/ {
            proxy_pass http://vectorqa_backend/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
