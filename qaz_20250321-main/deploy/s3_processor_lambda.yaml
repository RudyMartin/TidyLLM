AWSTemplateFormatVersion: '2010-09-09'
Description: 'MVR Review S3 File Processor Lambda Function'

Parameters:
  LandingBucketName:
    Type: String
    Default: 'mvr-landing-bucket'
    Description: 'S3 bucket for landing files'
  
  CatalogBucketName:
    Type: String
    Default: 'mvr-catalog-bucket'
    Description: 'S3 bucket for cataloged files'
  
  QuarantineBucketName:
    Type: String
    Default: 'mvr-quarantine-bucket'
    Description: 'S3 bucket for quarantined files'
  
  NotificationQueueName:
    Type: String
    Default: 'mvr-file-notifications'
    Description: 'SQS queue for file processing notifications'

Resources:
  # S3 Buckets
  LandingBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref LandingBucketName
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldFiles
            Status: Enabled
            ExpirationInDays: 7
            Prefix: ''
  
  CatalogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref CatalogBucketName
      VersioningConfiguration:
        Status: Enabled
  
  QuarantineBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref QuarantineBucketName
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldQuarantine
            Status: Enabled
            ExpirationInDays: 30
            Prefix: 'quarantine/'
  
  # SQS Queue
  NotificationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref NotificationQueueName
      VisibilityTimeoutSeconds: 300
      MessageRetentionPeriod: 1209600  # 14 days
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt NotificationDLQ.Arn
        maxReceiveCount: 3
  
  NotificationDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${NotificationQueueName}-dlq'
      MessageRetentionPeriod: 1209600  # 14 days
  
  # IAM Role for Lambda
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-lambda-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:CopyObject
                  - s3:HeadObject
                Resource:
                  - !Sub '${LandingBucket.Arn}/*'
                  - !Sub '${CatalogBucket.Arn}/*'
                  - !Sub '${QuarantineBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !GetAtt LandingBucket.Arn
                  - !GetAtt CatalogBucket.Arn
                  - !GetAtt QuarantineBucket.Arn
        - PolicyName: SQSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt NotificationQueue.Arn
  
  # Lambda Function
  S3ProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-s3-processor'
      Runtime: python3.9
      Handler: s3_file_processor.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          S3_LANDING_BUCKET: !Ref LandingBucketName
          S3_CATALOG_BUCKET: !Ref CatalogBucketName
          S3_QUARANTINE_BUCKET: !Ref QuarantineBucketName
          SQS_NOTIFICATION_QUEUE: !GetAtt NotificationQueue.Arn
      Code:
        ZipFile: |
          import json
          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'body': json.dumps('S3 Processor deployed successfully')
              }
  
  # S3 Event Notification
  S3ProcessorPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref S3ProcessorFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !GetAtt LandingBucket.Arn
  
  # CloudWatch Log Group
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${S3ProcessorFunction}'
      RetentionInDays: 14
  
  # S3 Bucket Notification Configuration
  LandingBucketNotification:
    Type: AWS::S3::BucketNotification
    Properties:
      Bucket: !Ref LandingBucket
      LambdaConfigurations:
        - Event: s3:ObjectCreated:*
          Function: !GetAtt S3ProcessorFunction.Arn
          Filter:
            S3Key:
              Rules:
                - Name: suffix
                  Value: .pdf
                - Name: suffix
                  Value: .docx
                - Name: suffix
                  Value: .txt
                - Name: suffix
                  Value: .md
                - Name: suffix
                  Value: .yaml
                - Name: suffix
                  Value: .yml
                - Name: suffix
                  Value: .json
                - Name: suffix
                  Value: .csv
                - Name: suffix
                  Value: .xlsx
                - Name: suffix
                  Value: .py
                - Name: suffix
                  Value: .r
                - Name: suffix
                  Value: .sql
                - Name: suffix
                  Value: .ipynb

Outputs:
  LandingBucketName:
    Description: 'Landing bucket for file uploads'
    Value: !Ref LandingBucketName
    Export:
      Name: !Sub '${AWS::StackName}-landing-bucket'
  
  CatalogBucketName:
    Description: 'Catalog bucket for processed files'
    Value: !Ref CatalogBucketName
    Export:
      Name: !Sub '${AWS::StackName}-catalog-bucket'
  
  QuarantineBucketName:
    Description: 'Quarantine bucket for invalid files'
    Value: !Ref QuarantineBucketName
    Export:
      Name: !Sub '${AWS::StackName}-quarantine-bucket'
  
  NotificationQueueUrl:
    Description: 'SQS queue for file processing notifications'
    Value: !Ref NotificationQueue
    Export:
      Name: !Sub '${AWS::StackName}-notification-queue'
  
  LambdaFunctionArn:
    Description: 'Lambda function ARN'
    Value: !GetAtt S3ProcessorFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-lambda-arn'


