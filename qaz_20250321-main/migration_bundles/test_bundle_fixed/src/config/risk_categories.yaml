# Risk Categories Configuration
# This file defines the four main risk categories used in the system
# Each category has specific parameters for risk assessment and validation

risk_categories:
  - name: "Model Risk"
    description: "Machine learning model performance, validation, and governance"
    base_risk_score: 6
    keywords:
      - "model"
      - "validation"
      - "testing"
      - "performance"
      - "drift"
      - "accuracy"
      - "bias"
      - "governance"
    sme_expertise_required: true
    validation_frequency: "weekly"
    critical_threshold: 8
    warning_threshold: 6
    common_events:
      - "Model Performance Degradation"
      - "Data Drift Detection"
      - "Model Bias Identification"
      - "Validation Failure"
      - "Backtesting Failure"

  - name: "Credit Risk"
    description: "Lending, default rates, portfolio concentration, and credit scoring"
    base_risk_score: 7
    keywords:
      - "credit"
      - "default"
      - "lending"
      - "borrower"
      - "collateral"
      - "portfolio"
      - "concentration"
      - "scoring"
    sme_expertise_required: true
    validation_frequency: "daily"
    critical_threshold: 9
    warning_threshold: 7
    common_events:
      - "Default Rate Increase"
      - "Credit Score Model Failure"
      - "Portfolio Concentration"
      - "Credit Limit Breach"
      - "Counterparty Default"

  - name: "Market Risk"
    description: "VaR models, volatility, liquidity, and market exposure"
    base_risk_score: 8
    keywords:
      - "market"
      - "volatility"
      - "var"
      - "liquidity"
      - "correlation"
      - "exposure"
      - "stress"
      - "trading"
    sme_expertise_required: true
    validation_frequency: "daily"
    critical_threshold: 9
    warning_threshold: 7
    common_events:
      - "VaR Model Breach"
      - "Market Volatility Spike"
      - "Liquidity Crisis"
      - "Correlation Breakdown"
      - "Interest Rate Shock"

  - name: "Operational Risk"
    description: "System failures, processes, human error, and business continuity"
    base_risk_score: 5
    keywords:
      - "operational"
      - "system"
      - "process"
      - "human"
      - "technology"
      - "failure"
      - "continuity"
      - "compliance"
    sme_expertise_required: true
    validation_frequency: "weekly"
    critical_threshold: 8
    warning_threshold: 6
    common_events:
      - "System Failure"
      - "Data Breach"
      - "Process Failure"
      - "Human Error"
      - "Third Party Failure"

# Configuration Notes:
# - base_risk_score: Starting risk score (1-10) for this category
# - validation_frequency: How often this category should be validated
# - critical_threshold: Risk score that triggers critical alerts
# - warning_threshold: Risk score that triggers warning alerts
# - keywords: Terms used to identify events in this category
# - common_events: Typical events that occur in this category
