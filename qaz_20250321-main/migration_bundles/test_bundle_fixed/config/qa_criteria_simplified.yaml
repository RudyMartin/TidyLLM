# QA Criteria Configuration - Simplified Version
# This file defines the streamlined QA criteria for overworked reviewers
# Converted from healthcheck-config-simplified.json for easier editing

version: "2.2.0"
metadata:
  name: "Simplified HealthCheck Configuration"
  description: "Streamlined configuration for overworked QA reviewers with reduced complexity"
  created_date: "2024-12-21T16:00:00Z"
  created_by: "user@example.com"
  last_updated: "2024-12-21T16:00:00Z"
  updated_by: "user@example.com"
  tags:
    - "simplified"
    - "qa-reviewer"
    - "express-mode"
    - "reduced-complexity"

settings:
  default_language: "en-US"
  timezone: "UTC"
  scoring_precision: 0
  auto_save_interval: 60
  session_timeout: 7200
  express_mode_enabled: true
  bulk_upload_enabled: true

features:
  enable_ai_suggestions: true
  require_evidence_upload: true
  allow_partial_scoring: true
  enable_collaborative_review: false
  enable_real_time_sync: true
  enable_audit_trail: true
  enable_express_mode: true
  enable_bulk_evidence_upload: true
  enable_smart_defaults: true

workflow_modes:
  standard:
    name: "Standard Review"
    description: "Complete HealthCheck with all criteria"
    estimated_time: "6-8 hours"
    use_case: "High-risk models, new models, regulatory submission"
  express:
    name: "Express Review"
    description: "Streamlined review for routine/low-risk models"
    estimated_time: "3-4 hours"
    use_case: "Routine updates, low-risk models, internal reviews"

checklist_categories:
  - id: "governance"
    name: "Model Governance & Documentation"
    description: "Essential governance framework and documentation"
    weight: 0.30
    color: "#3B82F6"
    icon: "FileText"
    required: true
    order: 1
    criteria:
      - id: "gov_essential"
        text: "Model development documentation and business use case complete"
        description: "Comprehensive documentation including methodology, business application, and development process"
        weight: 0.50
        required: true
        order: 1
        scoring_scale: "simple_3_point"
        pass_threshold: "pass"
        evidence_types:
          - "PDF"
          - "DOCX"
        regulatory_references:
          - "SR 11-7"
          - "Basel III"
        guidance: "Verify complete documentation package including methodology justification, business use case, and development timeline"
        combined_criteria:
          - "gov_001"
          - "gov_002"

      - id: "gov_approval"
        text: "Model limitations documented and governance approval obtained"
        description: "Documented limitations and required approvals from governance bodies"
        weight: 0.50
        required: true
        order: 2
        scoring_scale: "simple_3_point"
        pass_threshold: "pass"
        evidence_types:
          - "PDF"
          - "DOCX"
        guidance: "Ensure limitations are clearly stated and all required approvals are documented"
        combined_criteria:
          - "gov_003"
          - "gov_004"

  - id: "data_methodology"
    name: "Data Quality & Methodology"
    description: "Data validation and methodology assessment"
    weight: 0.35
    color: "#10B981"
    icon: "Database"
    required: true
    order: 2
    criteria:
      - id: "data_validation"
        text: "Source data validation and lineage documented"
        description: "Validation of data sources and complete documentation of data flow"
        weight: 0.40
        required: true
        order: 1
        scoring_scale: "simple_3_point"
        pass_threshold: "pass"
        evidence_types:
          - "PDF"
          - "XLSX"
        guidance: "Review data validation reports and ensure complete traceability of data from source to model"
        combined_criteria:
          - "data_001"
          - "data_002"

      - id: "data_quality"
        text: "Data quality metrics and missing data handling appropriate"
        description: "Data quality meets thresholds and missing data properly handled"
        weight: 0.30
        required: true
        order: 2
        scoring_scale: "simple_3_point"
        pass_threshold: "pass"
        evidence_types:
          - "XLSX"
          - "PDF"
        guidance: "Verify data quality metrics against benchmarks and review missing data policies"
        combined_criteria:
          - "data_003"
          - "data_004"

      - id: "methodology_compliance"
        text: "Methodology consistent with regulatory guidance and assumptions justified"
        description: "Model methodology aligns with regulations and key assumptions are documented"
        weight: 0.30
        required: true
        order: 3
        scoring_scale: "simple_3_point"
        pass_threshold: "pass"
        evidence_types:
          - "PDF"
          - "DOCX"
        regulatory_references:
          - "SR 11-7"
          - "Basel III"
          - "IFRS 9"
        guidance: "Verify methodology compliance and review assumption documentation for completeness"
        combined_criteria:
          - "method_001"
          - "method_002"

  - id: "testing_validation"
    name: "Testing & Performance Validation"
    description: "Model testing, validation, and performance assessment"
    weight: 0.35
    color: "#8B5CF6"
    icon: "CheckCircle"
    required: true
    order: 3
    criteria:
      - id: "model_calibration"
        text: "Model calibration and benchmarking performed appropriately"
        description: "Model calibration methods are appropriate and benchmarked against alternatives"
        weight: 0.30
        required: true
        order: 1
        scoring_scale: "simple_3_point"
        pass_threshold: "pass"
        evidence_types:
          - "PDF"
          - "XLSX"
        guidance: "Assess calibration methodology and review benchmarking analysis"
        combined_criteria:
          - "method_003"
          - "method_004"

      - id: "testing_comprehensive"
        text: "Backtesting and sensitivity analysis demonstrate acceptable performance"
        description: "Comprehensive testing shows model performs within expectations"
        weight: 0.40
        required: true
        order: 2
        scoring_scale: "simple_3_point"
        pass_threshold: "pass"
        evidence_types:
          - "PDF"
          - "XLSX"
        guidance: "Review backtesting methodology, results, and sensitivity analysis scope"
        combined_criteria:
          - "test_001"
          - "test_002"

      - id: "monitoring_framework"
        text: "Stress testing and performance monitoring framework established"
        description: "Stress testing completed and ongoing monitoring procedures in place"
        weight: 0.30
        required: true
        order: 3
        scoring_scale: "simple_3_point"
        pass_threshold: "pass"
        evidence_types:
          - "PDF"
          - "DOCX"
        guidance: "Review stress testing scenarios and verify monitoring procedures"
        combined_criteria:
          - "test_003"
          - "test_004"

workflow_steps:
  - step: 1
    id: "vst_selection"
    name: "VST Selection"
    description: "Choose validation scope template"
    required: true
    estimated_time: "15 minutes"
    completion_criteria:
      - "vst_selected"
    next_step_conditions:
      - "vst_id_present"
    actions:
      - id: "quick_select_vst"
        label: "Quick Select VST"
        type: "button"
        action: "open_vst_quick_selector"
        primary: true
      - id: "create_vst"
        label: "Create New VST"
        type: "button"
        action: "open_vst_creator"
        primary: false

  - step: 2
    id: "bulk_evidence_upload"
    name: "Evidence Upload"
    description: "Upload all evidence documents at once"
    required: true
    estimated_time: "30 minutes"
    completion_criteria:
      - "evidence_uploaded"
      - "auto_categorized"
    next_step_conditions:
      - "evidence_available"
    actions:
      - id: "bulk_upload"
        label: "Bulk Upload Evidence"
        type: "upload"
        action: "bulk_upload_with_categorization"
        primary: true

  - step: 3
    id: "streamlined_scoring"
    name: "Streamlined Scoring"
    description: "Review and score using simplified 3-point scale"
    required: true
    estimated_time: "2-3 hours"
    completion_criteria:
      - "all_criteria_scored"
    next_step_conditions:
      - "minimum_score_threshold_met"
    actions:
      - id: "quick_score"
        label: "Quick Score Mode"
        type: "navigate"
        action: "simplified_scoring_interface"
        primary: true

  - step: 4
    id: "consolidated_review"
    name: "Consolidated Review & Findings"
    description: "Combined analysis and recommendations generation"
    required: true
    estimated_time: "2-3 hours"
    completion_criteria:
      - "analysis_complete"
      - "recommendations_drafted"
      - "action_items_assigned"
    next_step_conditions:
      - "review_complete"
    actions:
      - id: "auto_generate_findings"
        label: "Auto-Generate Findings"
        type: "button"
        action: "run_automated_analysis"
        primary: true
      - id: "manual_review"
        label: "Manual Review"
        type: "navigate"
        action: "manual_findings_editor"
        primary: false

  - step: 5
    id: "quick_finalization"
    name: "Quick Finalization"
    description: "Generate and export QHR with templates"
    required: true
    estimated_time: "30 minutes"
    completion_criteria:
      - "qhr_generated"
      - "exports_created"
    next_step_conditions:
      - "final_approval"
    actions:
      - id: "template_qhr"
        label: "Generate from Template"
        type: "button"
        action: "generate_templated_report"
        primary: true
      - id: "custom_qhr"
        label: "Custom Report"
        type: "button"
        action: "generate_custom_report"
        primary: false

scoring_rules:
  scales:
    - id: "simple_3_point"
      name: "3-Point Assessment"
      type: "categorical"
      options:
        - value: "fail"
          label: "Fail"
          score: 0
          color: "#EF4444"
          description: "Significant deficiencies that must be addressed"
        - value: "conditional"
          label: "Conditional Pass"
          score: 70
          color: "#F59E0B"
          description: "Minor issues that should be addressed"
        - value: "pass"
          label: "Pass"
          score: 100
          color: "#10B981"
          description: "Meets or exceeds requirements"
    - id: "boolean"
      name: "Pass/Fail"
      type: "boolean"
      options:
        - value: false
          label: "Fail"
          score: 0
          color: "#EF4444"
        - value: true
          label: "Pass"
          score: 100
          color: "#10B981"
  composite_calculation:
    method: "weighted_average"
    rounding: "nearest_integer"
    minimum_score: 0
    maximum_score: 100
  thresholds:
    excellent: 95
    good: 85
    satisfactory: 70
    needs_improvement: 60

notification_settings:
  email_notifications: true
  deadline_reminders:
    enabled: true
    days_before:
      - 3
      - 1
  status_updates: true
  escalation_rules:
    - condition: "overdue_by_2_days"
      action: "notify_supervisor"
      recipients:
        - "user@example.com"

ui_customization:
  theme:
    primary_color: "#3B82F6"
    secondary_color: "#6B7280"
    success_color: "#10B981"
    warning_color: "#F59E0B"
    error_color: "#EF4444"
  labels:
    dashboard.title: "QA Reviewer Dashboard - Express Mode"
    healthcheck.start: "Start Express HealthCheck"
    scoring.complete: "Quick Score Complete"
    report.generate: "Generate Report"
  help_text:
    scoring.guidance: "Use 3-point scale: Pass (meets requirements), Conditional (minor issues), Fail (significant deficiencies)"
    evidence.upload: "Upload all evidence documents at once - they will be automatically categorized"
  layout:
    sidebar_width: "normal"
    show_progress_bar: true
    compact_mode: true
    show_simplified_indicators: true

express_mode_settings:
  enabled: true
  auto_population:
    enable_smart_defaults: true
    use_previous_scores: true
    suggest_evidence_mapping: true
  reduced_criteria_set: true
  bulk_operations:
    bulk_upload: true
    bulk_scoring: true
    template_generation: true
  time_saving_features:
    auto_save_frequency: 60
    session_restore: true
    keyboard_shortcuts: true
