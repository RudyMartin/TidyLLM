# Test Scenarios Configuration
# This file defines the test scenarios used for system validation
# Each scenario represents a specific risk event that can be tested

test_scenarios:
  - scenario_id: "1"
    name: "Model Performance Degradation"
    risk_category: "Model Risk"
    severity: "high"
    description: "Credit scoring model accuracy dropped from 95% to 78%"
    expected_response: "Should identify as high-risk, recommend immediate review"
    test_frequency: "weekly"
    is_active: true
    keywords:
      - "accuracy"
      - "degradation"
      - "performance"
      - "model"
    expected_risk_score: 8
    expected_confidence: 85
    expected_recommendations:
      - "Immediately review model inputs and data quality"
      - "Suspend automatic loan approvals until issue is resolved"
      - "Schedule emergency model validation review"
      - "Notify stakeholders of potential impact on business operations"

  - scenario_id: "2"
    name: "VaR Model Breach"
    risk_category: "Market Risk"
    severity: "critical"
    description: "Value at Risk exceeded limits during market volatility"
    expected_response: "Should trigger immediate action, recommend model suspension"
    test_frequency: "daily"
    is_active: true
    keywords:
      - "var"
      - "breach"
      - "volatility"
      - "market"
    expected_risk_score: 9
    expected_confidence: 90
    expected_recommendations:
      - "Immediately suspend VaR model and switch to manual risk assessment"
      - "Review portfolio positions and consider risk reduction measures"
      - "Notify senior management and risk committee"
      - "Implement enhanced monitoring for similar market conditions"

  - scenario_id: "3"
    name: "Data Quality Issues"
    risk_category: "Operational Risk"
    severity: "medium"
    description: "Training data completeness dropped below 90% threshold"
    expected_response: "Should flag for investigation, recommend data review"
    test_frequency: "weekly"
    is_active: true
    keywords:
      - "data"
      - "quality"
      - "completeness"
      - "threshold"
    expected_risk_score: 6
    expected_confidence: 75
    expected_recommendations:
      - "Investigate data pipeline and identify root cause"
      - "Review data validation procedures"
      - "Assess impact on current model performance"
      - "Implement additional data quality checks"

  - scenario_id: "4"
    name: "Credit Portfolio Concentration"
    risk_category: "Credit Risk"
    severity: "high"
    description: "Portfolio concentration in high-risk sectors exceeded limits"
    expected_response: "Should recommend portfolio rebalancing, risk assessment"
    test_frequency: "daily"
    is_active: true
    keywords:
      - "portfolio"
      - "concentration"
      - "credit"
      - "limits"
    expected_risk_score: 7
    expected_confidence: 80
    expected_recommendations:
      - "Conduct portfolio stress testing"
      - "Consider portfolio rebalancing to reduce concentration"
      - "Review credit limits for affected sectors"
      - "Implement enhanced monitoring for concentration risk"

  - scenario_id: "5"
    name: "Real-time Fraud Detection Failure"
    risk_category: "Operational Risk"
    severity: "critical"
    description: "Fraud detection model stopped processing transactions"
    expected_response: "Should trigger emergency response, manual review process"
    test_frequency: "daily"
    is_active: true
    keywords:
      - "fraud"
      - "detection"
      - "failure"
      - "transactions"
    expected_risk_score: 9
    expected_confidence: 95
    expected_recommendations:
      - "Immediately activate manual fraud review process"
      - "Notify fraud team and security personnel"
      - "Implement emergency backup systems"
      - "Review system logs for root cause analysis"

  - scenario_id: "6"
    name: "Interest Rate Shock"
    risk_category: "Market Risk"
    severity: "critical"
    description: "Sudden 200 basis point increase in interest rates"
    expected_response: "Should trigger stress testing and portfolio revaluation"
    test_frequency: "monthly"
    is_active: true
    keywords:
      - "interest"
      - "rate"
      - "shock"
      - "basis"
    expected_risk_score: 8
    expected_confidence: 85
    expected_recommendations:
      - "Run immediate stress testing scenarios"
      - "Revalue all interest rate sensitive positions"
      - "Review hedging strategies and effectiveness"
      - "Assess impact on funding costs and profitability"

  - scenario_id: "7"
    name: "Model Bias Detection"
    risk_category: "Model Risk"
    severity: "high"
    description: "Statistical parity test revealed bias against protected groups"
    expected_response: "Should trigger model review and potential retraining"
    test_frequency: "monthly"
    is_active: true
    keywords:
      - "bias"
      - "parity"
      - "protected"
      - "groups"
    expected_risk_score: 8
    expected_confidence: 90
    expected_recommendations:
      - "Immediately review model for fairness violations"
      - "Consider model retraining with balanced dataset"
      - "Implement bias monitoring and alerting"
      - "Review compliance with fair lending regulations"

  - scenario_id: "8"
    name: "System Outage"
    risk_category: "Operational Risk"
    severity: "critical"
    description: "Primary trading system unavailable for 30 minutes"
    expected_response: "Should activate business continuity procedures"
    test_frequency: "quarterly"
    is_active: true
    keywords:
      - "system"
      - "outage"
      - "trading"
      - "unavailable"
    expected_risk_score: 9
    expected_confidence: 95
    expected_recommendations:
      - "Activate backup trading systems immediately"
      - "Notify all trading desks and risk management"
      - "Implement manual trading procedures if needed"
      - "Begin incident response and root cause analysis"

# Configuration Notes:
# - severity: low, medium, high, critical (determines priority)
# - test_frequency: daily, weekly, monthly, quarterly
# - is_active: whether this scenario should be included in testing
# - expected_risk_score: what risk score the system should generate
# - expected_confidence: expected confidence level in the analysis
# - keywords: terms used to identify this scenario type
# - expected_recommendations: what recommendations should be generated
