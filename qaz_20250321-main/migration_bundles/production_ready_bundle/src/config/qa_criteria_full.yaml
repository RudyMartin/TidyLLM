# QA Criteria Configuration - Full Version
# This file defines the complete QA criteria for model validation reviews
# Converted from healthcheck-config.json for easier editing

version: "2.1.0"
metadata:
  name: "Default HealthCheck Configuration"
  description: "Standard configuration for QA Reviewer HealthCheck workflows"
  created_date: "2024-12-21T10:00:00Z"
  created_by: "user@example.com"
  last_updated: "2024-12-21T15:30:00Z"
  updated_by: "user@example.com"
  tags:
    - "default"
    - "qa-reviewer"
    - "model-validation"

settings:
  default_language: "en-US"
  timezone: "UTC"
  scoring_precision: 2
  auto_save_interval: 30
  session_timeout: 3600

features:
  enable_ai_suggestions: true
  require_evidence_upload: true
  allow_partial_scoring: false
  enable_collaborative_review: false
  enable_real_time_sync: true
  enable_audit_trail: true

checklist_categories:
  - id: "data_quality_content_control"
    name: "Data Quality/Content Control"
    description: "Information clarity, accuracy, and organization"
    weight: 0.25
    color: "#10B981"
    icon: "Database"
    required: true
    order: 1
    criteria:
      - id: "data_001"
        text: "Source data validation performed"
        description: "Validation of data sources for accuracy, completeness, and appropriateness for model use"
        weight: 0.25
        required: true
        order: 1
        scoring_scale: "percentage_100"
        pass_threshold: 70
        evidence_types:
          - "PDF"
          - "XLSX"
        regulatory_references:
          - "SR 11-7"
          - "Basel III"
        guidance: "Review data validation reports and quality metrics"

      - id: "data_002"
        text: "Data lineage documented"
        description: "Complete documentation of data flow from source systems through model processing"
        weight: 0.25
        required: true
        order: 2
        scoring_scale: "percentage_100"
        pass_threshold: 70
        evidence_types:
          - "PDF"
          - "DOCX"
        regulatory_references:
          - "SR 11-7"
        guidance: "Ensure complete traceability of data from source to model output"

      - id: "data_003"
        text: "Missing data handling appropriate"
        description: "Appropriate methods for handling missing, incomplete, or invalid data"
        weight: 0.25
        required: true
        order: 3
        scoring_scale: "percentage_100"
        pass_threshold: 70
        evidence_types:
          - "PDF"
          - "DOCX"
        regulatory_references:
          - "SR 11-7"
        guidance: "Review missing data policies and imputation methods"

      - id: "data_004"
        text: "Data quality metrics established"
        description: "Comprehensive data quality metrics and monitoring framework"
        weight: 0.25
        required: true
        order: 4
        scoring_scale: "percentage_100"
        pass_threshold: 70
        evidence_types:
          - "PDF"
          - "XLSX"
        regulatory_references:
          - "SR 11-7"
        guidance: "Verify data quality metrics, thresholds, and monitoring processes"

  - id: "governance_compliance"
    name: "Governance and Compliance"
    description: "Reports follow rules and include required references"
    weight: 0.20
    color: "#3B82F6"
    icon: "Shield"
    required: true
    order: 2
    criteria:
      - id: "gov_001"
        text: "Model development documentation complete"
        description: "Comprehensive documentation of model development process, including methodology selection and implementation details"
        weight: 0.25
        required: true
        order: 1
        scoring_scale: "percentage_100"
        pass_threshold: 70
        evidence_types:
          - "PDF"
          - "DOCX"
        regulatory_references:
          - "SR 11-7"
          - "Basel III"
        guidance: "Look for complete model development documentation including data sources, methodology justification, assumptions, and limitations"

      - id: "gov_002"
        text: "Business use case clearly defined"
        description: "Clear definition of model purpose, business application, and expected outcomes"
        weight: 0.25
        required: true
        order: 2
        scoring_scale: "percentage_100"
        pass_threshold: 70
        evidence_types:
          - "PDF"
          - "DOCX"
        regulatory_references:
          - "SR 11-7"
        guidance: "Verify that the business use case is clearly articulated with specific objectives and success criteria"

      - id: "gov_003"
        text: "Model limitations documented"
        description: "Comprehensive documentation of model limitations and constraints"
        weight: 0.25
        required: true
        order: 3
        scoring_scale: "percentage_100"
        pass_threshold: 70
        evidence_types:
          - "PDF"
          - "DOCX"
        regulatory_references:
          - "SR 11-7"
        guidance: "Ensure limitations are clearly stated with potential impact assessment"

      - id: "gov_004"
        text: "Governance approval obtained"
        description: "Required approvals from governance bodies and senior management"
        weight: 0.25
        required: true
        order: 4
        scoring_scale: "percentage_100"
        pass_threshold: 70
        evidence_types:
          - "PDF"
          - "DOCX"
        regulatory_references:
          - "SR 11-7"
        guidance: "Verify all required approvals are documented and current"

  - id: "validation_processes"
    name: "Validation Processes"
    description: "Proper validation methodology execution"
    weight: 0.20
    color: "#F59E0B"
    icon: "Settings"
    required: true
    order: 3
    criteria:
      - id: "val_001"
        text: "Validation methodology appropriate"
        description: "Validation approach is appropriate for model type and complexity"
        weight: 0.25
        required: true
        order: 1
        scoring_scale: "percentage_100"
        pass_threshold: 70
        evidence_types:
          - "PDF"
          - "DOCX"
        regulatory_references:
          - "SR 11-7"
        guidance: "Review validation methodology for appropriateness and comprehensiveness"

      - id: "val_002"
        text: "Validation scope comprehensive"
        description: "Validation covers all critical model components and assumptions"
        weight: 0.25
        required: true
        order: 2
        scoring_scale: "percentage_100"
        pass_threshold: 70
        evidence_types:
          - "PDF"
          - "DOCX"
        regulatory_references:
          - "SR 11-7"
        guidance: "Ensure validation scope addresses all model components and key assumptions"

      - id: "val_003"
        text: "Validation testing thorough"
        description: "Comprehensive testing of model performance and robustness"
        weight: 0.25
        required: true
        order: 3
        scoring_scale: "percentage_100"
        pass_threshold: 70
        evidence_types:
          - "PDF"
          - "XLSX"
        regulatory_references:
          - "SR 11-7"
        guidance: "Review validation testing for comprehensiveness and statistical rigor"

      - id: "val_004"
        text: "Validation results documented"
        description: "Complete documentation of validation findings and conclusions"
        weight: 0.25
        required: true
        order: 4
        scoring_scale: "percentage_100"
        pass_threshold: 70
        evidence_types:
          - "PDF"
          - "DOCX"
        regulatory_references:
          - "SR 11-7"
        guidance: "Ensure validation results are thoroughly documented with clear conclusions"

  - id: "validation_review_testing"
    name: "Validation Review and Testing"
    description: "Testing and review processes are thorough and independent"
    weight: 0.20
    color: "#8B5CF6"
    icon: "CheckCircle"
    required: true
    order: 4
    criteria:
      - id: "review_001"
        text: "Independent review conducted"
        description: "Validation review performed by qualified personnel independent of model development"
        weight: 0.25
        required: true
        order: 1
        scoring_scale: "percentage_100"
        pass_threshold: 70
        evidence_types:
          - "PDF"
          - "DOCX"
        regulatory_references:
          - "SR 11-7"
        guidance: "Verify reviewer independence and qualifications"

      - id: "review_002"
        text: "Review findings addressed"
        description: "All validation review findings have been addressed and resolved"
        weight: 0.25
        required: true
        order: 2
        scoring_scale: "percentage_100"
        pass_threshold: 70
        evidence_types:
          - "PDF"
          - "DOCX"
        regulatory_references:
          - "SR 11-7"
        guidance: "Ensure all review findings are documented and resolved"

      - id: "review_003"
        text: "Testing procedures validated"
        description: "Testing procedures are validated and appropriate for model type"
        weight: 0.25
        required: true
        order: 3
        scoring_scale: "percentage_100"
        pass_threshold: 70
        evidence_types:
          - "PDF"
          - "DOCX"
        regulatory_references:
          - "SR 11-7"
        guidance: "Review testing procedures for appropriateness and validation"

      - id: "review_004"
        text: "Testing results verified"
        description: "Testing results are verified and independently validated"
        weight: 0.25
        required: true
        order: 4
        scoring_scale: "percentage_100"
        pass_threshold: 70
        evidence_types:
          - "PDF"
          - "XLSX"
        regulatory_references:
          - "SR 11-7"
        guidance: "Verify testing results are independently validated and documented"

  - id: "style_formatting"
    name: "Style and Formatting"
    description: "Report looks professional and is easy to read"
    weight: 0.10
    color: "#EC4899"
    icon: "Eye"
    required: false
    order: 5
    criteria:
      - id: "style_001"
        text: "Report formatting professional"
        description: "Report follows professional formatting standards and is visually appealing"
        weight: 0.50
        required: false
        order: 1
        scoring_scale: "percentage_100"
        pass_threshold: 70
        evidence_types:
          - "PDF"
          - "DOCX"
        guidance: "Review report formatting for professionalism and visual appeal"

      - id: "style_002"
        text: "Content organization clear"
        description: "Report content is well-organized and easy to navigate"
        weight: 0.50
        required: false
        order: 2
        scoring_scale: "percentage_100"
        pass_threshold: 70
        evidence_types:
          - "PDF"
          - "DOCX"
        guidance: "Ensure content is logically organized and easy to follow"

  - id: "control_execution"
    name: "Control Execution"
    description: "Rules and procedures followed correctly"
    weight: 0.05
    color: "#6B7280"
    icon: "FileText"
    required: false
    order: 6
    criteria:
      - id: "control_001"
        text: "Procedures followed correctly"
        description: "All required procedures and controls are followed correctly"
        weight: 1.00
        required: false
        order: 1
        scoring_scale: "percentage_100"
        pass_threshold: 70
        evidence_types:
          - "PDF"
          - "DOCX"
        guidance: "Verify that all required procedures and controls are followed"

workflow_steps:
  - step: 1
    id: "vst_selection"
    name: "VST Selection"
    description: "Choose validation scope template"
    required: true
    estimated_time: "30 minutes"
    completion_criteria:
      - "vst_selected"
    next_step_conditions:
      - "vst_id_present"
    actions:
      - id: "create_vst"
        label: "Create VST"
        type: "button"
        action: "open_vst_creator"
        primary: false
      - id: "select_vst"
        label: "Select VST"
        type: "button"
        action: "open_vst_selector"
        primary: true

  - step: 2
    id: "input_gathering"
    name: "Input Gathering"
    description: "Load VR and HCR documents"
    required: true
    estimated_time: "1 hour"
    completion_criteria:
      - "vr_loaded"
      - "hcr_processed"
    next_step_conditions:
      - "evidence_available"
    actions:
      - id: "upload_evidence"
        label: "Upload Evidence"
        type: "upload"
        action: "upload_evidence_files"
        primary: true

  - step: 3
    id: "scoring"
    name: "Scoring"
    description: "Review and score criteria"
    required: true
    estimated_time: "4 hours"
    completion_criteria:
      - "all_criteria_scored"
    next_step_conditions:
      - "minimum_score_threshold_met"
    actions:
      - id: "score_criteria"
        label: "Score Criteria"
        type: "navigate"
        action: "scoring_interface"
        primary: true

  - step: 4
    id: "healthcheck_logic"
    name: "HealthCheck Logic"
    description: "Apply findings and analysis"
    required: true
    estimated_time: "2 hours"
    completion_criteria:
      - "findings_identified"
      - "risk_assessment_complete"
    next_step_conditions:
      - "findings_documented"
    actions:
      - id: "analyze_findings"
        label: "Analyze Findings"
        type: "button"
        action: "run_healthcheck_analysis"
        primary: true

  - step: 5
    id: "qa_findings"
    name: "QA Findings"
    description: "Generate recommendations"
    required: true
    estimated_time: "3 hours"
    completion_criteria:
      - "recommendations_drafted"
      - "action_items_assigned"
    next_step_conditions:
      - "qa_review_complete"
    actions:
      - id: "draft_recommendations"
        label: "Draft Recommendations"
        type: "navigate"
        action: "recommendations_editor"
        primary: true

  - step: 6
    id: "finalization"
    name: "Finalization"
    description: "Create and export QHR"
    required: true
    estimated_time: "1 hour"
    completion_criteria:
      - "qhr_generated"
      - "exports_created"
    next_step_conditions:
      - "final_approval"
    actions:
      - id: "generate_qhr"
        label: "Generate QHR"
        type: "button"
        action: "generate_final_report"
        primary: true
      - id: "export_pdf"
        label: "Export PDF"
        type: "download"
        action: "export_pdf_report"
        primary: false
      - id: "export_json"
        label: "Export JSON"
        type: "download"
        action: "export_json_data"
        primary: false

scoring_rules:
  scales:
    - id: "percentage_100"
      name: "Percentage (0-100)"
      type: "numeric"
      min: 0
      max: 100
      step: 1
    - id: "rating_5"
      name: "5-Point Rating"
      type: "categorical"
      options:
        - value: 1
          label: "Poor"
          score: 20
          color: "#EF4444"
        - value: 2
          label: "Fair"
          score: 40
          color: "#F59E0B"
        - value: 3
          label: "Good"
          score: 60
          color: "#3B82F6"
        - value: 4
          label: "Very Good"
          score: 80
          color: "#10B981"
        - value: 5
          label: "Excellent"
          score: 100
          color: "#059669"
    - id: "boolean"
      name: "Pass/Fail"
      type: "boolean"
      options:
        - value: false
          label: "Fail"
          score: 0
          color: "#EF4444"
        - value: true
          label: "Pass"
          score: 100
          color: "#10B981"
  composite_calculation:
    method: "weighted_average"
    rounding: "two_decimal"
    minimum_score: 0
    maximum_score: 100
  thresholds:
    excellent: 90
    good: 80
    satisfactory: 70
    needs_improvement: 60

notification_settings:
  email_notifications: true
  deadline_reminders:
    enabled: true
    days_before:
      - 7
      - 3
      - 1
  status_updates: true
  escalation_rules:
    - condition: "overdue_by_3_days"
      action: "notify_supervisor"
      recipients:
        - "user@example.com"

ui_customization:
  theme:
    primary_color: "#3B82F6"
    secondary_color: "#6B7280"
    success_color: "#10B981"
    warning_color: "#F59E0B"
    error_color: "#EF4444"
  labels:
    dashboard.title: "QA Reviewer Dashboard"
    healthcheck.start: "Start New HealthCheck"
    scoring.complete: "Complete Scoring"
    report.generate: "Generate Report"
  help_text:
    scoring.guidance: "Score each criterion based on the evidence provided and your professional judgment"
    evidence.upload: "Upload supporting evidence documents for each validation criterion"
  layout:
    sidebar_width: "normal"
    show_progress_bar: true
    compact_mode: false
