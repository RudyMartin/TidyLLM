# TidyLLM Enhanced Configuration - Single Source of Truth
# This file contains all credentials and comprehensive settings for the TidyLLM ecosystem

# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
postgres:
  host: "vectorqa-cluster.cluster-cu562e4m02nq.us-east-1.rds.amazonaws.com"
  port: 5432
  db_name: "vectorqa"
  db_user: "vectorqa_user"
  db_password: "REMOVED_PASSWORD"
  ssl_mode: "require"
  connection_pool_size: 10
  max_retries: 3
  retry_delay: 1.0

# =============================================================================
# AWS BEDROCK CONFIGURATION
# =============================================================================
aws:
  # AWS credentials
  access_key_id: REMOVED_AWS_KEY
  secret_access_key: REMOVED_AWS_SECRET
  default_region: us-east-1
  
  # KMS Key for encryption
  kms_key_id: "arn:aws:kms:us-east-1:188494237500:key/5573d70c-3f2d-44ca-924e-463faba85389"
  region: "us-east-1"
  
  bedrock:
    # Default AWS region for Bedrock services
    region: "us-east-1"
    
    # AWS credentials configuration
    credentials:
      profile: null
      access_key_id: REMOVED_AWS_KEY
      secret_access_key: REMOVED_AWS_SECRET
      session_token: null
    
    # Default model configurations
    default_model: "anthropic.claude-3-sonnet-20240229-v1:0"
    
    # Model-specific settings
    models:
      # Claude Models
      claude:
        "anthropic.claude-3-sonnet-20240229-v1:0":
          max_tokens: 4096
          temperature: 0.7
          top_p: 1.0
          top_k: 250
          stop_sequences: ["\n\nHuman:", "\n\nAssistant:", "\n\nHuman", "\n\nAssistant"]
        
        "anthropic.claude-3-haiku-20240307-v1:0":
          max_tokens: 4096
          temperature: 0.7
          top_p: 1.0
          top_k: 250
          stop_sequences: ["\n\nHuman:", "\n\nAssistant:", "\n\nHuman", "\n\nAssistant"]

# API Keys (add your own)
api_keys:
  anthropic: null  # Set your Anthropic API key here
  openai: null     # Set your OpenAI API key here
  # Note: Anthropic and OpenAI are disabled for this client (nice to have)
  # To enable, set the keys above and change enabled flags below
  anthropic_enabled: false
  openai_enabled: false

# Model Configuration
models:
  default: anthropic/claude-3-sonnet-20240229
  available:
    - anthropic/claude-3-sonnet-20240229
    - anthropic/claude-3-haiku-20240307
    - openai/gpt-3.5-turbo
    - openai/gpt-4
    - openai/gpt-4-turbo

# QA Processing Settings
qa:
  watch_folder: ./qa_files
  output_folder: ./qa_reports
  config_folder: ./qa_config
  mlflow_enabled: true

# MLflow Configuration  
mlflow:
  tracking_uri: file:./mlruns
  experiment_prefix: tidyllm

# Integration Settings
integrations:
  aws_enabled: true
  mlflow_enabled: true
  database_enabled: true

# TidyLLM Basic API Settings
basic_api:
  simulation_mode: false  # Set to true to force simulation mode
  default_max_tokens: 1000
  default_temperature: 0.7

# =============================================================================
# RETRY CONFIGURATION
# =============================================================================
retry:
  # Default retry settings
  default:
    max_retries: 3
    base_delay: 1.0
    max_delay: 60.0
    backoff_factor: 2.0
    retry_on_exceptions: ["Exception"]

# =============================================================================
# CACHE CONFIGURATION
# =============================================================================
cache:
  # Default cache settings
  default:
    enabled: true
    cache_dir: ".bedrock_cache"
    expiration_hours: 24
    compression: true
    max_cache_size_mb: 100

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
logging:
  # Default log level
  level: "INFO"
  
  # Log format
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # Log file settings
  file:
    enabled: true
    path: "tidyllm.log"
    max_size_mb: 10
    backup_count: 5
  
  # Console logging
  console:
    enabled: true

# =============================================================================
# COST OPTIMIZATION
# =============================================================================
cost_optimization:
  # Enable cost tracking
  enabled: true
  
  # Cost limits and alerts
  limits:
    # Daily cost limit (in USD)
    daily_limit: 10.0
    
    # Monthly cost limit (in USD)
    monthly_limit: 100.0
    
    # Alert when approaching limit (percentage)
    alert_threshold: 80.0

# =============================================================================
# SECURITY AND COMPLIANCE
# =============================================================================
security:
  # Data handling
  data:
    # Encrypt cached data
    encrypt_cache: false
    
    # Mask sensitive data in logs
    mask_sensitive_data: true
    
    # Retention policy for cached data (days)
    cache_retention_days: 30