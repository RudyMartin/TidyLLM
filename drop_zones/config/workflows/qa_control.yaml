# QA Control Workflow Configuration
# Replaces multiple qa_* scripts with single parameterized config

workflow_name: "QA Control"
workflow_id: "qa_control_v1" 
description: "6-stage QA pipeline: ingest → extract → embed → index → analysis → reports"
created_by: "TidyLLM Config System"
version: "1.0"

# Parameters (can be overridden by environment configs)
parameters:
  # Folder structure (using tiered drop zones)
  base_path: "drop_zones/qa_control"
  source_folder: "${base_path}/incoming"
  processing_folder: "${base_path}/processing"
  output_folder: "${base_path}/reports"
  audit_folder: "${base_path}/audit"
  completed_folder: "${base_path}/completed"
  
  # File handling
  file_patterns: ["*.xlsx", "*.pdf", "*.txt", "*.docx"]
  excel_tabs: ["core_checklist", "custom_checklist", "custom_prompts"]
  
  # Processing parameters  
  max_timeout: 300
  retry_attempts: 3
  parallel_processing: true
  audit_trail_required: true
  
  # Integration settings
  s3_bucket: "nsc-mvp1"
  s3_prefix: "qa_control"
  mlflow_experiment: "qa_control_processing"

# Gateway Configuration  
gateways:
  primary: "dspy"
  secondary: "llm" 
  specialized:
    excel_processing: "heiros"
    embedding_generation: "dspy" 
    report_generation: "llm"
    audit_tracking: "heiros"

# 6-Stage QA Control Pipeline
stages:
  
  # Stage 1: QA Ingest - File intake and validation
  ingest:
    description: "Excel file processing and validation"
    drop_zone: "${parameters.source_folder}"
    output_zone: "${parameters.base_path}/ingest"
    
    operations:
      - name: "validate_excel_structure"
        gateway: "${gateways.specialized.excel_processing}"
        instruction: "Validate Excel has required tabs: ${parameters.excel_tabs}"
        timeout: "${parameters.max_timeout}"
        
      - name: "extract_excel_tabs"
        gateway: "${gateways.specialized.excel_processing}"
        instruction: "Extract data from all three Excel tabs"
        depends_on: ["validate_excel_structure"]
        
      - name: "create_audit_record"
        gateway: "${gateways.specialized.audit_tracking}"
        instruction: "Create audit trail with 7-year retention"
        depends_on: ["extract_excel_tabs"]
        audit_required: "${parameters.audit_trail_required}"
    
    routing:
      - condition: "validation_passed == true"
        destination: "${parameters.base_path}/extract"
        action: "move_file"

  # Stage 2: QA Extract - Content extraction and parsing  
  extract:
    description: "Extract and parse QA content from Excel tabs"
    drop_zone: "${parameters.base_path}/ingest"
    output_zone: "${parameters.base_path}/extract"
    
    operations:
      - name: "parse_core_checklist"
        gateway: "${gateways.primary}"
        instruction: "Parse core checklist tab into structured data"
        timeout: "${parameters.max_timeout}"
        
      - name: "parse_custom_checklist" 
        gateway: "${gateways.primary}"
        instruction: "Parse custom checklist tab into structured data"
        parallel_group: "parsing"
        
      - name: "parse_custom_prompts"
        gateway: "${gateways.primary}"
        instruction: "Parse custom prompts tab into structured data" 
        parallel_group: "parsing"
        
      - name: "validate_extracted_content"
        gateway: "${gateways.secondary}"
        instruction: "Validate all extracted content for completeness"
        depends_on: ["parse_core_checklist", "parse_custom_checklist", "parse_custom_prompts"]
    
    routing:
      - condition: "extraction_complete == true"
        destination: "${parameters.base_path}/embed"
        action: "move_file"

  # Stage 3: QA Embed - Generate embeddings
  embed:
    description: "Generate embeddings for QA content" 
    drop_zone: "${parameters.base_path}/extract"
    output_zone: "${parameters.base_path}/embed"
    
    operations:
      - name: "generate_embeddings"
        gateway: "${gateways.specialized.embedding_generation}"
        instruction: "Generate embeddings for all QA content using TidyLLM sentence"
        timeout: "${parameters.max_timeout}"
        
      - name: "store_embeddings_s3"
        gateway: "${gateways.specialized.audit_tracking}"
        instruction: "Store embeddings in S3: ${parameters.s3_bucket}/${parameters.s3_prefix}/embeddings/"
        depends_on: ["generate_embeddings"]
    
    routing:
      - condition: "embeddings_generated == true"
        destination: "${parameters.base_path}/index"
        action: "move_file"

  # Stage 4: QA Index - Create searchable index
  index: 
    description: "Create searchable index from embeddings"
    drop_zone: "${parameters.base_path}/embed"
    output_zone: "${parameters.base_path}/index"
    
    operations:
      - name: "create_vector_index"
        gateway: "${gateways.specialized.embedding_generation}"
        instruction: "Create vector index for QA content search"
        timeout: "${parameters.max_timeout}"
        
      - name: "store_index_database"
        gateway: "${gateways.specialized.audit_tracking}"
        instruction: "Store index in PostgreSQL database"
        depends_on: ["create_vector_index"]
    
    routing:
      - condition: "index_created == true"
        destination: "${parameters.base_path}/analysis"
        action: "move_file"

  # Stage 5: QA Analysis - Perform analysis
  analysis:
    description: "Perform QA analysis on indexed content"
    drop_zone: "${parameters.base_path}/index"
    output_zone: "${parameters.base_path}/analysis"
    
    operations:
      - name: "run_qa_analysis"
        gateway: "${gateways.primary}"
        instruction: "Execute QA analysis using checklist and prompts"
        timeout: "${parameters.max_timeout}"
        
      - name: "track_mlflow_experiment"
        gateway: "${gateways.specialized.audit_tracking}"
        instruction: "Log experiment to MLflow: ${parameters.mlflow_experiment}"
        depends_on: ["run_qa_analysis"]
    
    routing:
      - condition: "analysis_complete == true"
        destination: "${parameters.base_path}/reports"
        action: "move_file"

  # Stage 6: QA Reports - Generate final reports
  reports:
    description: "Generate QA reports in multiple formats"
    drop_zone: "${parameters.base_path}/analysis"
    output_zone: "${parameters.output_folder}"
    
    operations:
      - name: "generate_markdown_report"
        gateway: "${gateways.specialized.report_generation}"
        instruction: "Generate comprehensive markdown report"
        timeout: "${parameters.max_timeout}"
        output_format: "markdown"
        
      - name: "generate_json_summary"
        gateway: "${gateways.primary}"
        instruction: "Generate structured JSON summary"
        depends_on: ["generate_markdown_report"]
        output_format: "json"
        
      - name: "archive_final_outputs"
        gateway: "${gateways.specialized.audit_tracking}"
        instruction: "Archive outputs to ${parameters.completed_folder}/YYYY-MM-DD/"
        depends_on: ["generate_markdown_report", "generate_json_summary"]
    
    routing:
      - condition: "all_reports_generated == true"
        destination: "${parameters.completed_folder}"
        action: "archive_with_date"
        cleanup: true

# Monitoring and Quality Control
monitoring:
  progress_updates: true
  audit_logging: "${parameters.audit_trail_required}"
  error_notifications: true
  processing_metrics: true
  
quality_gates:
  excel_structure_validation: required
  content_extraction_validation: required
  embedding_quality_check: required
  report_format_validation: required

# Error Handling
error_handling:
  max_retries: "${parameters.retry_attempts}"
  fallback_gateway: "${gateways.secondary}"
  error_queue: "${parameters.base_path}/failed/"
  notification_webhook: "tidymart://qa_alerts"