# TidyLLM Enhanced DSPy Wrapper Settings
# This file contains all default configurations for the enhanced DSPy wrapper

# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
postgres:
  host: "vectorqa-cluster.cluster-cu562e4m02nq.us-east-1.rds.amazonaws.com"
  port: 5432
  db_name: "vectorqa"
  db_user: "vectorqa_user"
  db_password: "REMOVED_PASSWORD"
  ssl_mode: "require"
  connection_pool_size: 10
  max_retries: 3
  retry_delay: 1.0

# =============================================================================
# AWS BEDROCK CONFIGURATION
# =============================================================================
aws:
  # KMS Key for encryption
  kms_key_id: "arn:aws:kms:us-east-1:188494237500:key/5573d70c-3f2d-44ca-924e-463faba85389"
  region: "us-east-1"
  
  # S3 Configuration
  s3:
    default_bucket: "nsc-mvp1"
    default_prefix: "papers/"
    use_kms_encryption: true
  
  bedrock:
    # Default AWS region for Bedrock services
    region: "us-east-1"
    
    # AWS credentials configuration
    # Leave empty to use default AWS credentials (IAM roles, profiles, etc.)
    credentials:
      profile: null  # AWS profile name (e.g., "default", "production")
      access_key_id: null  # AWS access key ID
      secret_access_key: null  # AWS secret access key
      session_token: null  # AWS session token (for temporary credentials)
    
    # Default model configurations
    default_model: "anthropic.claude-3-sonnet-20240229-v1:0"
    
    # Model-specific settings
    models:
      # Claude Models
      claude:
        anthropic.claude-3-sonnet-20gn t240229-v1:0:
          max_tokens: 4096
          temperature: 0.7
          top_p: 1.0
          top_k: 250
          stop_sequences: ["\n\nHuman:", "\n\nAssistant:", "\n\nHuman", "\n\nAssistant"]
        
        anthropic.claude-3-haiku-20240307-v1:0:
          max_tokens: 4096
          temperature: 0.7
          top_p: 1.0
          top_k: 250
          stop_sequences: ["\n\nHuman:", "\n\nAssistant:", "\n\nHuman", "\n\nAssistant"]
        
        anthropic.claude-3-opus-20240229-v1:0:
          max_tokens: 4096
          temperature: 0.7
          top_p: 1.0
          top_k: 250
          stop_sequences: ["\n\nHuman:", "\n\nAssistant:", "\n\nHuman", "\n\nAssistant"]
        
        anthropic.claude-v2:1:
          max_tokens: 4096
          temperature: 0.7
          top_p: 1.0
          top_k: 250
          stop_sequences: ["\n\nHuman:", "\n\nAssistant:", "\n\nHuman", "\n\nAssistant"]
        
        anthropic.claude-v2:
          max_tokens: 4096
          temperature: 0.7
          top_p: 1.0
          top_k: 250
          stop_sequences: ["\n\nHuman:", "\n\nAssistant:", "\n\nHuman", "\n\nAssistant"]
        
        anthropic.claude-instant-v1:
          max_tokens: 4096
          temperature: 0.7
          top_p: 1.0
          top_k: 250
          stop_sequences: ["\n\nHuman:", "\n\nAssistant:", "\n\nHuman", "\n\nAssistant"]
      
      # Titan Models
      titan:
        amazon.titan-text-express-v1:
          max_tokens: 4096
          temperature: 0.7
          top_p: 1.0
          top_k: 250
          stop_sequences: ["User:", "Assistant:", "Human:", "Bot:"]
        
        amazon.titan-text-lite-v1:
          max_tokens: 4096
          temperature: 0.7
          top_p: 1.0
          top_k: 250
          stop_sequences: ["User:", "Assistant:", "Human:", "Bot:"]
        
        amazon.titan-embed-text-v1:
          max_tokens: 4096
          temperature: 0.7
          top_p: 1.0
          top_k: 250
          stop_sequences: ["User:", "Assistant:", "Human:", "Bot:"]
      
      # Llama Models
      llama:
        meta.llama2-13b-chat-v1:
          max_tokens: 4096
          temperature: 0.7
          top_p: 1.0
          top_k: 250
          stop_sequences: ["<|endoftext|>", "</s>", "<s>"]
        
        meta.llama2-70b-chat-v1:
          max_tokens: 4096
          temperature: 0.7
          top_p: 1.0
          top_k: 250
          stop_sequences: ["<|endoftext|>", "</s>", "<s>"]
        
        meta.llama2-7b-chat-v1:
          max_tokens: 4096
          temperature: 0.7
          top_p: 1.0
          top_k: 250
          stop_sequences: ["<|endoftext|>", "</s>", "<s>"]

# =============================================================================
# RETRY CONFIGURATION
# =============================================================================
retry:
  # Default retry settings
  default:
    max_retries: 3
    base_delay: 1.0
    max_delay: 60.0
    backoff_factor: 2.0
    retry_on_exceptions: ["Exception"]
  
  # Model-specific retry settings
  models:
    # Claude models - more conservative retry strategy
    claude:
      max_retries: 3
      base_delay: 1.0
      max_delay: 30.0
      backoff_factor: 2.0
    
    # Titan models - faster retry strategy
    titan:
      max_retries: 2
      base_delay: 0.5
      max_delay: 15.0
      backoff_factor: 1.5
    
    # Llama models - standard retry strategy
    llama:
      max_retries: 3
      base_delay: 1.0
      max_delay: 45.0
      backoff_factor: 2.0

# =============================================================================
# CACHE CONFIGURATION
# =============================================================================
cache:
  # Default cache settings
  default:
    enabled: true
    cache_dir: ".bedrock_cache"
    expiration_hours: 24
    compression: true
    max_cache_size_mb: 100
  
  # Model-specific cache settings
  models:
    # Claude models - longer cache for expensive models
    claude:
      expiration_hours: 48
      max_cache_size_mb: 200
    
    # Titan models - shorter cache for faster models
    titan:
      expiration_hours: 12
      max_cache_size_mb: 50
    
    # Llama models - standard cache settings
    llama:
      expiration_hours: 24
      max_cache_size_mb: 100

# =============================================================================
# VALIDATION CONFIGURATION
# =============================================================================
validation:
  # Default validation settings
  default:
    min_length: 10
    max_length: null  # No maximum length by default
    required_keywords: []
    forbidden_keywords: []
    strict_mode: false
  
  # Task-specific validation settings
  tasks:
    summarization:
      min_length: 50
      max_length: 500
      required_keywords: ["summary", "key", "points"]
      forbidden_keywords: ["error", "fail", "cannot"]
    
    analysis:
      min_length: 100
      max_length: 1000
      required_keywords: ["analysis", "insights", "findings"]
      forbidden_keywords: ["error", "fail", "cannot"]
    
    translation:
      min_length: 20
      max_length: null
      required_keywords: []
      forbidden_keywords: ["error", "fail", "cannot", "untranslatable"]
    
    code_generation:
      min_length: 10
      max_length: null
      required_keywords: []
      forbidden_keywords: ["error", "fail", "cannot", "invalid"]

# =============================================================================
# BATCH PROCESSING CONFIGURATION
# =============================================================================
batch:
  # Default batch processing settings
  default:
    batch_size: 10
    max_workers: 4
    timeout_seconds: 300
  
  # Model-specific batch settings
  models:
    # Claude models - smaller batches due to rate limits
    claude:
      batch_size: 5
      max_workers: 2
      timeout_seconds: 600
    
    # Titan models - larger batches for faster processing
    titan:
      batch_size: 15
      max_workers: 6
      timeout_seconds: 300
    
    # Llama models - standard batch settings
    llama:
      batch_size: 10
      max_workers: 4
      timeout_seconds: 300

# =============================================================================
# METRICS AND MONITORING
# =============================================================================
metrics:
  # Enable metrics collection
  enabled: true
  
  # Metrics collection settings
  collection:
    # Track response times
    response_times: true
    
    # Track cache performance
    cache_performance: true
    
    # Track retry statistics
    retry_statistics: true
    
    # Track cost estimates
    cost_estimates: true
    
    # Track validation failures
    validation_failures: true
  
  # Metrics export settings
  export:
    # Export metrics to file
    to_file: true
    file_path: "metrics.json"
    
    # Export metrics to console
    to_console: false
    
    # Export metrics to external service (future feature)
    to_external: false

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
logging:
  # Default log level
  level: "INFO"
  
  # Log format
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # Log file settings
  file:
    enabled: true
    path: "tidyllm.log"
    max_size_mb: 10
    backup_count: 5
  
  # Console logging
  console:
    enabled: true
  
  # Model-specific logging
  models:
    # Claude models - detailed logging for debugging
    claude:
      level: "DEBUG"
    
    # Titan models - standard logging
    titan:
      level: "INFO"
    
    # Llama models - standard logging
    llama:
      level: "INFO"

# =============================================================================
# COST OPTIMIZATION
# =============================================================================
cost_optimization:
  # Enable cost tracking
  enabled: true
  
  # Cost limits and alerts
  limits:
    # Daily cost limit (in USD)
    daily_limit: 10.0
    
    # Monthly cost limit (in USD)
    monthly_limit: 100.0
    
    # Alert when approaching limit (percentage)
    alert_threshold: 80.0
  
  # Model selection strategy
  strategy:
    # Prefer cheaper models when possible
    prefer_cheaper: true
    
    # Fallback to cheaper models on errors
    fallback_on_error: true
    
    # Use caching to reduce costs
    use_caching: true

# =============================================================================
# SECURITY AND COMPLIANCE
# =============================================================================
security:
  # Data handling
  data:
    # Encrypt cached data
    encrypt_cache: false
    
    # Mask sensitive data in logs
    mask_sensitive_data: true
    
    # Retention policy for cached data (days)
    cache_retention_days: 30
  
  # Access control
  access:
    # Require authentication
    require_auth: true
    
    # Rate limiting
    rate_limit:
      enabled: true
      requests_per_minute: 60
      requests_per_hour: 1000

# =============================================================================
# PERFORMANCE OPTIMIZATION
# =============================================================================
performance:
  # Connection pooling
  connection_pool:
    enabled: true
    max_connections: 10
    max_retries: 3
  
  # Request optimization
  request:
    # Compress requests
    compression: true
    
    # Timeout settings
    timeout_seconds: 30
    
    # Keep-alive connections
    keep_alive: true
  
  # Memory management
  memory:
    # Maximum memory usage (MB)
    max_usage_mb: 512
    
    # Garbage collection frequency
    gc_frequency: 100

# =============================================================================
# DEVELOPMENT AND TESTING
# =============================================================================
development:
  # Development mode settings
  dev_mode:
    enabled: false
    
    # Use mock responses in development
    use_mocks: false
    
    # Mock response delay (seconds)
    mock_delay: 0.1
  
  # Testing settings
  testing:
    # Test mode enabled
    enabled: false
    
    # Use test models
    use_test_models: false
    
    # Test cache directory
    test_cache_dir: ".test_cache"

# =============================================================================
# INTEGRATION SETTINGS
# =============================================================================
integrations:
  # MLflow integration
  mlflow:
    enabled: false
    tracking_uri: null
    experiment_name: "tidyllm-enhanced"
  
  # Weights & Biases integration
  wandb:
    enabled: false
    project_name: "tidyllm-enhanced"
  
  # Prometheus metrics
  prometheus:
    enabled: false
    port: 8000

# =============================================================================
# ENVIRONMENT-SPECIFIC OVERRIDES
# =============================================================================
environments:
  # Development environment
  development:
    aws:
      bedrock:
        region: "us-east-1"
    logging:
      level: "DEBUG"
    cache:
      enabled: false
  
  # Production environment
  production:
    aws:
      bedrock:
        region: "us-east-1"
    logging:
      level: "WARNING"
    cache:
      enabled: true
    security:
      data:
        encrypt_cache: true
  
  # Testing environment
  testing:
    aws:
      bedrock:
        region: "us-east-1"
    logging:
      level: "ERROR"
    cache:
      enabled: false
    development:
      dev_mode:
        enabled: true
        use_mocks: true
